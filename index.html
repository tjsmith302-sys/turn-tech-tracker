<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Goturn</title>
<meta name="theme-color" content="#1a1814" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Goturn" />
<link rel="apple-touch-icon" href="./goturn-icon-180.png" />
<link rel="icon" type="image/png" sizes="512x512" href="./goturn-icon-512.png" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---------- Goturn · Dusk + Moss ---------- */
  :root {
    --bg: #1a1814;
    --bg-grad: #1a1814;
    --surface: #22201c;
    --surface-2: #2a2722;
    --ink: #efe7d5;           /* ivory */
    --ink-soft: #b8b0a0;
    --ink-faint: #77726a;
    --line: rgba(239, 231, 213, 0.09);
    --line-strong: rgba(239, 231, 213, 0.18);
    --accent: #8fb194;        /* moss-text — Done / complete */
    --accent-soft: #2a352b;   /* moss-soft */
    --moss: #5a7a5e;
    --moss-deep: #3d5240;
    --warn: #c89a58;          /* brass — In Progress / mid stock */
    --warn-soft: #3a2f1c;
    --stop: #b5593a;          /* rust — low stock / danger / waiting */
    --stop-soft: #3a1f16;
    --done: #77726a;          /* ivory-faint — Not Started pill */
    --done-soft: rgba(239, 231, 213, 0.06);
    --blue: #5a7a5e;          /* moss — FAB, scan btn, Waiting on Vendor */
    --blue-soft: #2a352b;
    --radius: 14px;
    --radius-lg: 14px;
    --shadow-sm: 0 0 0 transparent;
    --shadow: 0 0 0 transparent;
    --shadow-lg: 0 8px 32px rgba(0,0,0,.45);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    --serif: "Fraunces", "Georgia", serif;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; color: var(--ink); }
  html { background: var(--bg); }
  body {
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.45;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height: 100vh;
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== Live oak gate loader ===== */
  #goturn-loader {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity .6s .3s, visibility .6s .3s;
  }
  #goturn-loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
  #goturn-loader .illus-wrap {
    position: relative;
    width: min(92vw, 520px);
    aspect-ratio: 4 / 3;
    display: flex; align-items: center; justify-content: center;
  }
  #goturn-loader .illus-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 22% 18% at center, rgba(239, 231, 213, 0.22) 0%, rgba(239, 231, 213, 0.08) 50%, transparent 80%);
    opacity: 0;
    animation: gtglow 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    pointer-events: none;
    filter: blur(12px);
  }
  @keyframes gtglow {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  #goturn-loader .illus {
    position: relative;
    width: 100%;
    height: 100%;
    background: url('./gate-oaks.jpg') center / contain no-repeat;
    opacity: 0;
    animation: gtillus 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    /* Feather the edges so JPEG background blends into dusk */
    -webkit-mask-image: radial-gradient(ellipse 62% 58% at center, #000 35%, transparent 85%);
    mask-image: radial-gradient(ellipse 62% 58% at center, #000 35%, transparent 85%);
  }
  @keyframes gtillus {
    0% { opacity: 0; transform: scale(1.02); }
    100% { opacity: 0.7; transform: scale(1); }
  }
  #goturn-loader .brand-word {
    font-family: var(--mono); font-size: 11px; letter-spacing: .28em;
    color: var(--ink-soft); opacity: 0; text-transform: uppercase;
    animation: gtfade 0.6s 1.2s forwards;
  }
  @keyframes gtfade { to { opacity: 1; } }
  button, input, select, textarea { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }

  /* ---------- Layout ---------- */
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 14px 16px 120px;
  }

  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0 18px;
    gap: 12px;
  }
  header.top h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    line-height: 1.15;
    color: var(--ink);
  }
  .brand-mark {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 36px;
    flex: 0 0 auto;
    margin-right: 6px;
    align-self: flex-start;
    overflow: visible;
    /* Let leaves spill below the tree */
  }
  .brand-mark .tree {
    display: block;
    width: 100%;
    height: 100%;
    color: var(--accent);
    transform-origin: 50% 95%;
    animation: gtsway 7s ease-in-out infinite;
  }
  .brand-mark .leaf {
    position: absolute;
    width: 5px;
    height: 6px;
    color: var(--accent);
    opacity: 0;
    will-change: transform, opacity;
    pointer-events: none;
  }
  .brand-mark .leaf svg { display: block; width: 100%; height: 100%; }
  /* Each leaf starts at a position within the canopy, drifts down ~72px */
  .brand-mark .leaf.l1 { left: 8px;  top: 8px;  animation: gtleaf1 5.5s linear infinite; animation-delay: 0s; }
  .brand-mark .leaf.l2 { left: 22px; top: 6px;  animation: gtleaf2 6.2s linear infinite; animation-delay: 1.4s; }
  .brand-mark .leaf.l3 { left: 14px; top: 12px; animation: gtleaf3 5.8s linear infinite; animation-delay: 2.8s; }
  .brand-mark .leaf.l4 { left: 26px; top: 14px; animation: gtleaf1 6.5s linear infinite; animation-delay: 4.1s; }
  .brand-mark .leaf.l5 { left: 6px;  top: 16px; animation: gtleaf2 5.2s linear infinite; animation-delay: 3.3s; }
  @keyframes gtsway {
    0%, 100% { transform: rotate(-1.5deg); }
    50%      { transform: rotate(1.5deg); }
  }
  @keyframes gtleaf1 {
    0%   { transform: translate(0, 0) rotate(0deg);    opacity: 0; }
    10%  { opacity: 0.75; }
    50%  { transform: translate(-4px, 36px) rotate(90deg); opacity: 0.55; }
    90%  { opacity: 0; }
    100% { transform: translate(2px, 72px) rotate(180deg); opacity: 0; }
  }
  @keyframes gtleaf2 {
    0%   { transform: translate(0, 0) rotate(0deg);    opacity: 0; }
    10%  { opacity: 0.7; }
    50%  { transform: translate(5px, 38px) rotate(-90deg); opacity: 0.5; }
    90%  { opacity: 0; }
    100% { transform: translate(-3px, 74px) rotate(-180deg); opacity: 0; }
  }
  @keyframes gtleaf3 {
    0%   { transform: translate(0, 0) rotate(0deg);    opacity: 0; }
    10%  { opacity: 0.8; }
    50%  { transform: translate(2px, 40px) rotate(120deg); opacity: 0.55; }
    90%  { opacity: 0; }
    100% { transform: translate(-4px, 76px) rotate(240deg); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .brand-mark .tree { animation: none; transform: none; }
    .brand-mark .leaf { display: none; }
  }
  .brand-name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  header.top h1 span#summary {
    display: block;
    flex-basis: 100%;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }
  .sync {
    display: inline-block !important;
    margin-top: 4px !important;
    padding: 3px 10px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 10px !important;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }
  .sync.synced { display: none !important; }
  .sync.saving { background: var(--warn-soft); color: var(--warn); border-color: var(--warn-soft); }
  .sync.offline { background: var(--stop-soft); color: var(--stop); border-color: var(--stop-soft); }
  .theme-btn { display: none !important; }

  /* ---------- Search + filters ---------- */
  .controls {
    position: sticky;
    top: 0;
    z-index: 5;
    padding: 8px 0 10px;
    margin-bottom: 6px;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 80%, rgba(26,24,20,0) 100%);
  }
  .search {
    width: 100%;
    height: 46px;
    padding: 0 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink);
    outline: none;
    font-size: 15px;
  }
  .search::placeholder { color: var(--ink-faint); }
  .search:focus { border-color: var(--line-strong); }
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 2px 4px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: transform .12s ease-out, background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chip:active { transform: scale(0.93); }
  .chip[aria-pressed="true"] {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--moss-deep);
  }
  .blocker-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .blocker-chip {
    flex: 0 0 auto;
    height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--ink-soft);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: transform .12s ease-out, background .15s ease, color .15s ease, border-color .15s ease;
  }
  .blocker-chip:active { transform: scale(0.93); }
  .blocker-chip.on {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--moss-deep);
  }

  /* ---------- Motion: press, stagger, view crossfade ---------- */
  button:active, .tabs button:active, .card-actions button:active {
    transform: scale(0.97);
  }
  button, .tabs button, .card-actions button {
    transition: transform .12s ease-out, background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease;
  }
  .gt-rise {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity .5s cubic-bezier(0.22, 1, 0.36, 1), transform .5s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: opacity, transform;
  }
  .gt-rise.in {
    opacity: 1;
    transform: none;
  }
  section#view-units, section#view-inventory {
    transition: opacity .18s ease;
  }
  .view-fading { opacity: 0; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) {
    .gt-rise, .gt-rise.in { transition: none; opacity: 1; transform: none; }
    section#view-units, section#view-inventory { transition: none; }
    button:active, .chip:active, .tabs button:active, .card-actions button:active { transform: none; }
  }

  /* ---------- Cards ---------- */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--ink-faint);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color .2s ease;
  }
  .card:has(.status-progress) { border-left-color: var(--warn); }
  .card:has(.status-part)     { border-left-color: var(--stop); }
  .card:has(.status-vendor)   { border-left-color: var(--moss); }
  .card:has(.status-done)     { border-left-color: var(--accent); }
  .card:has(.status-not)      { border-left-color: var(--ink-faint); }
  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 14px 10px;
  }
  .unit-id {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.1;
    color: var(--ink);
  }
  .unit-id small {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-faint);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .status-pill {
    align-self: flex-start;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status-not       { background: var(--done-soft); color: var(--done); }
  .status-progress  { background: var(--accent-soft); color: var(--accent); }
  .status-part      { background: var(--warn-soft); color: var(--warn); }
  .status-vendor    { background: var(--blue-soft); color: var(--blue); }
  .status-done      { background: var(--done-soft); color: var(--done); text-decoration: none; }

  .meta {
    padding: 0 14px 4px;
    font-size: 14px;
  }
  .meta .row {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-top: 1px dashed var(--line);
  }
  .meta .row:first-child { border-top: none; }
  .meta .label {
    flex: 0 0 80px;
    color: var(--ink-faint);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 2px;
  }

  /* Move-in date badges */
  .move-in {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
    margin-top: 4px;
  }
  .move-in.urgent { background: var(--stop-soft); color: var(--stop); }
  .move-in.soon   { background: var(--warn-soft); color: var(--warn); }
  .move-in.ok     { background: var(--accent-soft); color: var(--accent); }
  .move-in.past   { background: var(--done-soft); color: var(--done); }

  /* Missing-part item flag */
  .item.needs-part .item-text {
    color: var(--warn);
  }
  .part-tag {
    display: inline-block;
    margin-left: 6px;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--warn-soft);
    color: var(--warn);
    font-weight: 500;
    letter-spacing: 0.02em;
    vertical-align: middle;
  }
  .item-part-btn {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0.55;
    transition: opacity 120ms, color 120ms, background 120ms;
  }
  .item-part-btn:hover { opacity: 0.9; }
  .item-part-btn.active {
    opacity: 1;
    color: var(--warn);
    background: var(--warn-soft);
  }
  .item-part-btn svg, .add-item-row .part-toggle svg { width: 18px; height: 18px; display: block; }
  .tag-glyph { width: 12px; height: 12px; display: inline-block; vertical-align: -2px; margin-right: 3px; opacity: 0.9; }
  .add-item-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }
  .add-item-row input[data-add-input] {
    flex: 1;
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
    min-width: 0;
  }
  .add-item-row .part-toggle {
    flex: 0 0 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 120ms, background 120ms, border-color 120ms;
  }
  .add-item-row .part-toggle.active {
    background: var(--warn-soft);
    color: var(--warn);
    border-color: var(--warn-soft);
  }
  .add-item-row button[data-add-btn] {
    flex: 0 0 auto;
    height: 42px;
    padding: 0 14px;
    border-radius: 10px;
    background: var(--ink);
    color: var(--bg);
    font-weight: 500;
  }
  .add-item-part-name {
    margin-top: 6px;
    width: 100%;
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px dashed var(--warn);
    background: var(--warn-soft);
    outline: none;
    font-size: 13px;
    color: var(--ink);
    display: none;
  }
  .add-item-part-name.show { display: block; }
  .meta .value { flex: 1; color: var(--ink); }
  .meta .value.empty { color: var(--ink-faint); font-style: italic; }

  /* Urgency group headers */
  .urgency-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 4px 6px;
    margin-top: 4px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink-soft);
  }
  .urgency-header:first-child { margin-top: 0; padding-top: 4px; }
  .urgency-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .urgency-urgent .urgency-dot {
    background: var(--stop);
    box-shadow: 0 0 0 3px rgba(227, 92, 87, 0.18);
  }
  .urgency-soon .urgency-dot {
    background: var(--warn);
    box-shadow: 0 0 0 3px rgba(214, 138, 74, 0.18);
  }
  .urgency-later .urgency-dot {
    background: var(--blue);
    box-shadow: 0 0 0 3px rgba(106, 122, 209, 0.18);
  }
  .urgency-none .urgency-dot {
    background: var(--ink-faint);
    box-shadow: 0 0 0 3px rgba(154, 152, 174, 0.15);
  }
  .urgency-label { flex: 1; color: var(--ink); }
  .urgency-urgent .urgency-label { color: var(--stop); }
  .urgency-count {
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* Low-stock alert inside card meta */
  .low-stock-alert {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--stop-soft);
    color: var(--stop);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
  }
  .low-stock-dot {
    flex: 0 0 8px;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--stop);
    box-shadow: 0 0 0 3px rgba(227, 92, 87, 0.15);
  }

  /* ---------- Progress ---------- */
  .progress-wrap {
    padding: 8px 14px 12px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue) 0%, #9a7bd1 100%);
    border-radius: 999px;
    transition: width .3s ease;
  }

  /* ---------- Items ---------- */
  .items {
    padding: 4px 14px 10px;
  }
  .items-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
  }
  .items-head .count {
    background: var(--surface-2);
    color: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.03em;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 2px;
    border-top: 1px solid var(--line);
    min-height: 44px;
  }
  .item:first-of-type { border-top: none; }
  .check {
    flex: 0 0 24px;
    height: 24px;
    margin-top: 1px;
    border-radius: 6px;
    border: 1.5px solid var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: all .15s ease;
  }
  .item.done .check {
    background: var(--ink);
    border-color: var(--ink);
    color: white;
  }
  .check svg { width: 14px; height: 14px; display: none; }
  .item.done .check svg { display: block; }
  .item-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    padding-top: 2px;
    word-break: break-word;
  }
  .item.done .item-text {
    color: var(--ink-faint);
    text-decoration: line-through;
  }
  .item-del {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    color: var(--ink-faint);
    font-size: 18px;
    opacity: 0;
    transition: opacity .15s;
  }
  .item:hover .item-del,
  .item:focus-within .item-del { opacity: 1; }

  .add-item {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .add-item input {
    flex: 1;
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
  }
  .add-item input:focus { border-color: var(--ink-faint); }
  .add-item button {
    height: 42px;
    padding: 0 14px;
    border-radius: 10px;
    background: var(--ink);
    color: var(--bg);
    font-weight: 500;
  }

  /* ---------- Card actions ---------- */
  .card-actions {
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--surface-2);
  }
  .card-actions button {
    flex: 1;
    height: 46px;
    font-size: 13px;
    color: var(--ink-soft);
    border-right: 1px solid var(--line);
  }
  .card-actions button:last-child { border-right: none; }
  .card-actions button:active { background: var(--line); }
  .card-actions .action-complete {
    color: var(--accent);
    font-weight: 500;
  }
  .card-actions .action-reopen {
    color: var(--warn);
    font-weight: 500;
  }

  /* ---------- Empty ---------- */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-size: 14px;
  }

  /* ---------- Floating add ---------- */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--moss);
    color: var(--ink);
    font-size: 26px;
    font-weight: 400;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .45);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s ease;
  }
  .fab:active { transform: scale(0.96); }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, .55);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 20;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 24px; max-height: 86vh; }
  }
  .modal h2 {
    margin: 0 0 16px;
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
    font-size: 16px;
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--ink-faint); }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .modal-actions button {
    flex: 1;
    height: 48px;
    border-radius: 10px;
    font-weight: 500;
    font-size: 15px;
  }
  .scan-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 14px; margin-bottom: 14px;
    background: var(--surface-2);
    border: 1px solid var(--line); border-radius: var(--radius);
    color: var(--accent); font: inherit; font-weight: 500; font-size: 14px;
    cursor: pointer; transition: transform 0.08s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .scan-btn:active { transform: scale(0.98); background: var(--blue-soft); }
  .scan-btn[disabled] { opacity: 0.7; cursor: default; }
  .scan-btn.scanning .scan-icon { animation: scanspin 1s linear infinite; }
  @keyframes scanspin { to { transform: rotate(360deg); } }
  .btn-primary { background: var(--moss); color: var(--ink); font-weight: 500; }
  .btn-ghost { background: var(--surface-2); color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-danger { background: var(--stop-soft); color: var(--stop); border: 1px solid var(--stop-soft); }

  /* ---------- Top tab nav (moss underline, flat) ---------- */
  .tabs {
    display: flex;
    gap: 0;
    margin: 4px 0 12px;
    padding: 0;
    border-bottom: 1px solid var(--line);
    background: transparent;
  }
  .tabs button {
    flex: 0 0 auto;
    height: 40px;
    padding: 0 0 6px;
    margin-right: 28px;
    border-radius: 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-faint);
    position: relative;
    background: transparent;
  }
  .tabs button[aria-pressed="true"] {
    color: var(--ink);
  }
  .tabs button[aria-pressed="true"]::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -1px;
    height: 2px;
    background: var(--accent);
  }

  /* ---------- Inventory ---------- */
  .inv-banner {
    margin: 0 0 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    background: var(--stop-soft);
    color: var(--stop);
    font-weight: 500;
    display: none;
    box-shadow: var(--shadow-sm);
  }
  .inv-banner.show { display: block; }
  .inv-group {
    margin-bottom: 18px;
  }
  .inv-group-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .inv-group.low .inv-group-head { color: var(--stop); }
  .inv-group.med .inv-group-head { color: var(--warn); }
  .inv-group.ok  .inv-group-head { color: var(--accent); }
  .inv-group-head .count {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--ink-faint);
  }
  .inv-list {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .inv-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
    min-height: 52px;
    background: var(--surface);
  }
  .inv-row:first-child { border-top: none; }
  .inv-row:active { background: var(--surface-2); }
  .inv-dot {
    flex: 0 0 10px;
    width: 10px;
    height: 10px;
    border-radius: 999px;
  }
  .inv-dot.low { background: var(--stop); }
  .inv-dot.med { background: var(--warn); }
  .inv-dot.ok  { background: var(--accent); }
  .inv-name {
    flex: 1;
    font-size: 15px;
    color: var(--ink);
    word-break: break-word;
  }
  .inv-count {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: right;
  }
  .inv-count.low { color: var(--stop); }
  .inv-count.med { color: var(--warn); }
  .inv-count.ok  { color: var(--accent); }
  .inv-order-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
    margin: 0 0 4px;
  }
  .inv-order-tag.overdue {
    background: var(--stop-soft);
    color: var(--stop);
  }
  .inv-row.onorder { background: linear-gradient(90deg, var(--accent-soft) 0%, var(--surface) 40%); }
  .inv-row.onorder.overdue { background: linear-gradient(90deg, var(--stop-soft) 0%, var(--surface) 55%); }
  .order-window-row {
    display: flex;
    gap: 10px;
    margin: 14px 0 6px;
  }
  .order-window-btn {
    flex: 1;
    padding: 14px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .order-window-btn:active { transform: scale(0.98); }
  .order-window-btn.on {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .order-window-btn .sub {
    display: block;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .order-window-btn.on .sub { color: var(--accent); }

  /* Action sheet */
  .sheet h3 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 600;
  }
  .sheet .sub {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .qty-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .qty-btn {
    width: 54px;
    height: 54px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
  }
  .qty-num {
    font-size: 36px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 70px;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .sheet-action {
    display: block;
    width: 100%;
    height: 48px;
    border-radius: 10px;
    margin-top: 8px;
    font-size: 15px;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--ink);
    text-align: center;
  }
  .sheet-action.danger { color: var(--stop); }
  .sheet-action.primary { background: var(--moss); color: var(--ink); font-weight: 500; }

  /* Live count tag on unit item linked to inventory */
  .count-tag {
    display: inline-block;
    margin-left: 6px;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.02em;
    vertical-align: middle;
  }
  .count-tag.low { background: var(--stop-soft); color: var(--stop); }
  .count-tag.med { background: var(--warn-soft); color: var(--warn); }
  .count-tag.ok  { background: var(--accent-soft); color: var(--accent); }

  /* Inventory picker list inside modal */
  .picker-search {
    width: 100%;
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
    margin-bottom: 10px;
    font-size: 15px;
  }
  .picker-list {
    max-height: 46vh;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    font-size: 15px;
    cursor: pointer;
  }
  .picker-row:first-child { border-top: none; }
  .picker-row:active { background: var(--surface-2); }
  .picker-empty {
    padding: 18px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 13px;
  }
  .picker-new {
    margin-top: 10px;
    padding: 10px;
    border: 1px dashed var(--line);
    border-radius: 10px;
    background: var(--surface-2);
  }
  .picker-new input {
    width: 100%;
    height: 38px;
    padding: 0 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--surface);
    outline: none;
    font-size: 14px;
  }
  .picker-new .picker-new-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .picker-new .picker-new-row input { flex: 1; }
  .picker-new button {
    flex: 0 0 auto;
    padding: 0 14px;
    height: 38px;
    border-radius: 8px;
    background: var(--ink);
    color: var(--bg);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- Live oak gate loader -->
<div id="goturn-loader" aria-hidden="true">
  <div class="illus-wrap">
    <div class="illus" role="img" aria-label="Goturn"></div>
  </div>
  <div class="brand-word">GOTURN</div>
</div>

<div class="wrap">
  <header class="top">
    <h1>
      <span class="brand-mark" aria-hidden="true">
        <svg class="tree" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- trunk -->
          <path d="M18 34 L18 22" stroke-width="1.6" />
          <!-- trunk taper hints -->
          <path d="M18 28 C 17 27, 16.6 26, 16.8 25" opacity="0.7" />
          <path d="M18 28 C 19 27, 19.4 26, 19.2 25" opacity="0.7" />
          <!-- leafy canopy: layered blobs -->
          <ellipse cx="18" cy="14" rx="12" ry="9" fill="currentColor" fill-opacity="0.18" stroke="none" />
          <ellipse cx="12" cy="13" rx="7"  ry="6" fill="currentColor" fill-opacity="0.22" stroke="none" />
          <ellipse cx="24" cy="13" rx="7"  ry="6" fill="currentColor" fill-opacity="0.22" stroke="none" />
          <ellipse cx="18" cy="9"  rx="6"  ry="5" fill="currentColor" fill-opacity="0.25" stroke="none" />
          <!-- canopy outline, loose organic curve -->
          <path d="M6 16 C 4 10, 10 3, 18 4 C 26 3, 32 10, 30 16 C 32 20, 26 24, 18 23 C 10 24, 4 20, 6 16 Z" stroke-width="1.1" />
          <!-- interior branches hinting through canopy -->
          <path d="M18 22 L 14 16" opacity="0.55" />
          <path d="M18 22 L 22 16" opacity="0.55" />
          <path d="M18 22 L 18 14" opacity="0.5" />
        </svg>
        <span class="leaf l1"><svg viewBox="0 0 6 7" fill="currentColor"><path d="M3 0 C 5 2, 5 5, 3 7 C 1 5, 1 2, 3 0 Z"/></svg></span>
        <span class="leaf l2"><svg viewBox="0 0 6 7" fill="currentColor"><path d="M3 0 C 5 2, 5 5, 3 7 C 1 5, 1 2, 3 0 Z"/></svg></span>
        <span class="leaf l3"><svg viewBox="0 0 6 7" fill="currentColor"><path d="M3 0 C 5 2, 5 5, 3 7 C 1 5, 1 2, 3 0 Z"/></svg></span>
        <span class="leaf l4"><svg viewBox="0 0 6 7" fill="currentColor"><path d="M3 0 C 5 2, 5 5, 3 7 C 1 5, 1 2, 3 0 Z"/></svg></span>
        <span class="leaf l5"><svg viewBox="0 0 6 7" fill="currentColor"><path d="M3 0 C 5 2, 5 5, 3 7 C 1 5, 1 2, 3 0 Z"/></svg></span>
      </span>
      <span class="brand-name">Goturn</span>
      <span id="summary">—</span>
      <span id="syncStatus" class="sync" title="Sync status"></span>
    </h1>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" style="display:none;">🌙</button>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="units" aria-pressed="true">Units</button>
    <button data-tab="inventory" aria-pressed="false">Inventory</button>
  </nav>

  <!-- Units view -->
  <section id="view-units">
    <div class="controls">
      <input class="search" id="search" type="search" placeholder="Search unit, item, blocker…" />
      <div class="filters" id="filters">
        <button class="chip" data-filter="active" aria-pressed="true">Active</button>
        <button class="chip" data-filter="hold" aria-pressed="false">On Hold</button>
        <button class="chip" data-filter="Done" aria-pressed="false">Completed</button>
      </div>
    </div>

    <div class="cards" id="cards"></div>
  </section>

  <!-- Inventory view -->
  <section id="view-inventory" style="display:none;">
    <div class="inv-banner" id="invBanner"></div>
    <div class="controls">
      <input class="search" id="invSearch" type="search" placeholder="Search inventory…" />
    </div>
    <div id="invList"></div>
  </section>
</div>

<button class="fab" id="addUnitBtn" aria-label="Add unit">＋</button>
<button class="fab" id="addInvBtn" aria-label="Add inventory item" style="display:none;">＋</button>

<!-- Edit unit modal -->
<div class="modal-backdrop" id="unitModal">
  <div class="modal">
    <h2 id="modalTitle">Edit Unit</h2>
    <div class="field">
      <label>Unit Number</label>
      <input id="f-id" type="text" inputmode="text" placeholder="e.g. 924" />
    </div>
    <div class="field">
      <label>Category</label>
      <input id="f-category" type="text" placeholder="Go Backs, Full Turn, Punch…" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="f-status">
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Waiting on Part</option>
        <option>Waiting on Vendor</option>
        <option>Done</option>
      </select>
    </div>
    <div class="field">
      <label>Blocker</label>
      <div id="f-blocker-presets" class="blocker-presets" role="group" aria-label="Common blockers">
        <button type="button" class="blocker-chip" data-preset="Counter resurfacing">Counter resurfacing</button>
        <button type="button" class="blocker-chip" data-preset="Pest control">Pest control</button>
        <button type="button" class="blocker-chip" data-preset="Paint contractor">Paint contractor</button>
        <button type="button" class="blocker-chip" data-preset="Cleaners">Cleaners</button>
        <button type="button" class="blocker-chip" data-preset="Carpet">Carpet</button>
      </div>
      <input id="f-blocker" type="text" placeholder="Other / custom (optional)" />
    </div>
    <div class="field">
      <label>Next Step</label>
      <textarea id="f-next"></textarea>
    </div>
    <div class="field">
      <label>Move-in Date (optional)</label>
      <input id="f-movein" type="date" />
    </div>
    <div class="field">
      <label>Vendor / Part Source (optional)</label>
      <input id="f-vendor" type="text" placeholder="Shop, supplier…" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="f-cancel">Cancel</button>
      <button class="btn-danger" id="f-delete">Delete</button>
      <button class="btn-primary" id="f-save">Save</button>
    </div>
  </div>
</div>

<!-- Inventory item edit modal -->
<div class="modal-backdrop" id="invEditModal">
  <div class="modal">
    <h2 id="invEditTitle">Edit Item</h2>
    <button class="scan-btn" id="inv-scan-btn" type="button">
      <svg class="scan-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span id="inv-scan-label">Scan label</span>
    </button>
    <input id="inv-scan-input" type="file" accept="image/*" capture="environment" style="display:none;" />
    <div class="field">
      <label>Name</label>
      <input id="inv-name" type="text" placeholder="e.g. Blinds, Cabinet pulls…" />
    </div>
    <div class="field">
      <label>Part number (optional)</label>
      <input id="inv-part-number" type="text" placeholder="e.g. 469500, RP1740…" autocapitalize="characters" />
    </div>
    <div class="field">
      <label>Count</label>
      <input id="inv-count" type="number" inputmode="numeric" min="0" step="1" />
    </div>
    <div class="field">
      <label>Supplier (optional)</label>
      <input id="inv-supplier" type="text" placeholder="Shop, vendor, store…" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="inv-cancel">Cancel</button>
      <button class="btn-danger" id="inv-delete">Delete</button>
      <button class="btn-primary" id="inv-save">Save</button>
    </div>
  </div>
</div>

<!-- Inventory row action sheet -->
<div class="modal-backdrop" id="invSheet">
  <div class="modal sheet">
    <h3 id="sheet-name">Item</h3>
    <div class="sub" id="sheet-sub">—</div>
    <div class="qty-row">
      <button class="qty-btn" data-qty="-1">−</button>
      <div class="qty-num" id="sheet-qty">0</div>
      <button class="qty-btn" data-qty="1">+</button>
    </div>
    <button class="sheet-action" id="sheet-order-btn" data-sheet="order" style="display:none;">Mark on order</button>
    <button class="sheet-action" id="sheet-arrived-btn" data-sheet="arrived" style="display:none;">Did it arrive?</button>
    <button class="sheet-action" id="sheet-cancel-order-btn" data-sheet="cancel-order" style="display:none;">Cancel order</button>
    <button class="sheet-action" data-sheet="edit">Edit name / supplier</button>
    <button class="sheet-action danger" data-sheet="delete">Delete item</button>
    <button class="sheet-action" data-sheet="close">Close</button>
  </div>

/* ================================================================

   Data lives in localStorage. Everything is plain state + render.
================================================================ */

const STORAGE_KEY = 'turn-tech-tracker/v1';
const THEME_KEY = 'turn-tech-tracker/theme';

/* ---------- Cloud sync (Supabase) ---------- */
const SUPABASE_URL = 'https://yglpobqgsjvrthtnnhrn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Uvc0cbE3zx_Szp7s883nCQ_xhoQrlNS';
const ROW_ID = 'main';
const REST_ENDPOINT = `${SUPABASE_URL}/rest/v1/turn_tech_tracker`;
const POLL_INTERVAL_MS = 2500; // how often to check for teammate updates

const supaHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

let lastRemoteStateJSON = null;  // to ignore our own echoes
let lastRemoteUpdatedAt = null;  // to skip unchanged rows
let saveTimer = null;
let pollTimer = null;
let isSaving = false;

function setSync(status, label) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync ' + status;
  el.textContent = label;
}

async function cloudLoad(attempt=0) {
  setSync('saving', 'Loading…');
  try {
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}&select=state,updated_at`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) {
      const remote = rows[0].state;
      lastRemoteUpdatedAt = rows[0].updated_at;
      if (Array.isArray(remote) && remote.length > 0) {
        state = remote;
        lastRemoteStateJSON = JSON.stringify(remote);
        saveLocal();
        render();
      } else {
        // First-ever sync — push whatever we have up.
        await cloudPush(true);
      }
    }
    setSync('synced', 'Synced');
  } catch (e) {
    console.warn('cloud load failed (attempt ' + attempt + ')', e);
    if (attempt < 3) {
      // Silent retry with backoff — avoids a flash of Offline on slow first load.
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
      return cloudLoad(attempt + 1);
    }
    setSync('offline', 'Offline');
  }
}

// Check the cloud for teammate changes. Runs on a timer.
async function cloudPoll() {
  if (isSaving) return; // don't fight our own in-flight write
  try {
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}&select=state,updated_at`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!rows || !rows[0]) return;
    const remoteUpdatedAt = rows[0].updated_at;
    if (remoteUpdatedAt === lastRemoteUpdatedAt) {
      // Nothing new, but request succeeded — clear any stale Offline state.
      const el = document.getElementById('syncStatus');
      if (el && el.classList.contains('offline')) setSync('synced', 'Synced');
      return;
    }
    const remote = rows[0].state;
    const remoteJSON = JSON.stringify(remote);
    lastRemoteUpdatedAt = remoteUpdatedAt;
    // Ignore if it's our own echo.
    if (remoteJSON === JSON.stringify(state)) {
      lastRemoteStateJSON = remoteJSON;
      setSync('synced', 'Synced');
      return;
    }
    // Pull teammate's changes in.
    state = remote;
    lastRemoteStateJSON = remoteJSON;
    saveLocal();
    render();
    setSync('synced', 'Updated');
    setTimeout(() => setSync('synced', 'Synced'), 1500);
  } catch (e) {
    setSync('offline', 'Offline');
  }
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(cloudPoll, POLL_INTERVAL_MS);
  // Also refresh immediately when the tab regains focus — faster feel on mobile.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') cloudPoll();
  });
}

async function cloudPush(initial=false) {
  const payload = JSON.stringify(state);
  if (payload === lastRemoteStateJSON && !initial) return;
  setSync('saving', 'Saving…');
  isSaving = true;
  try {
    const nowIso = new Date().toISOString();
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}`, {
      method: 'PATCH',
      headers: { ...supaHeaders, 'Prefer': 'return=representation' },
      body: JSON.stringify({ state, updated_at: nowIso })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) lastRemoteUpdatedAt = rows[0].updated_at;
    lastRemoteStateJSON = payload;
    setSync('synced', 'Synced');
  } catch (e) {
    console.warn('cloud push failed', e);
    setSync('offline', 'Offline — retrying');
    setTimeout(() => cloudPush(), 3000);
  } finally {
    isSaving = false;
  }
}

function scheduleCloudPush() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudPush, 400);
}

/* ---------- Inventory cloud sync ---------- */
const INV_ENDPOINT = `${SUPABASE_URL}/rest/v1/inventory_items`;
let inventory = [];           // [{id,name,count,supplier,status,...}]
let invLastUpdatedAt = null;  // newest updated_at we've seen
let invSaveTimers = {};       // per-id debounce

function invColor(c) {
  if (c <= 1) return 'low';
  if (c <= 4) return 'med';
  return 'ok';
}
function invId() {
  return 'i_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ---------- Order state (stored in inv.status as "onorder:{json}") ---------- */
function parseOrder(inv) {
  if (!inv || !inv.status || typeof inv.status !== 'string') return null;
  if (!inv.status.startsWith('onorder:')) return null;
  try {
    const raw = inv.status.slice(8);
    const o = JSON.parse(raw);
    if (!o.dueAt) return null;
    const now = Date.now();
    const due = Date.parse(o.dueAt);
    return {
      qtyOnWay: Number(o.qtyOnWay) || 0,
      dueAt: o.dueAt,
      markedAt: o.markedAt || null,
      windowHours: Number(o.windowHours) || 48,
      isOverdue: isFinite(due) && now > due,
      msRemaining: isFinite(due) ? (due - now) : 0
    };
  } catch (e) { return null; }
}
function encodeOrder(o) {
  return 'onorder:' + JSON.stringify({
    qtyOnWay: o.qtyOnWay || 0,
    dueAt: o.dueAt,
    markedAt: o.markedAt || new Date().toISOString(),
    windowHours: o.windowHours || 48
  });
}
function formatDue(order) {
  if (!order) return '';
  if (order.isOverdue) return 'Overdue — check arrival';
  const ms = order.msRemaining;
  const hours = Math.max(0, Math.round(ms / 3600000));
  if (hours < 1) return 'Due within the hour';
  if (hours < 24) return `Due in ${hours}h`;
  const days = Math.round(hours / 24);
  return days === 1 ? 'Due tomorrow' : `Due in ${days}d`;
}
function saveOrderFor(inv, orderObj) {
  inv.status = encodeOrder(orderObj);
  invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: inv.status });
  renderInventory();
  renderBanner();
}
function clearOrderFor(inv) {
  inv.status = 'normal';
  invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: 'normal' });
  renderInventory();
  renderBanner();
}

async function invLoad() {
  try {
    const res = await fetch(`${INV_ENDPOINT}?select=*&order=name.asc`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    inventory = rows || [];
    invLastUpdatedAt = inventory.reduce((max, r) => r.updated_at > max ? r.updated_at : max, '');
    renderInventory();
    renderBanner();
    render(); // unit view may show linked count tags
  } catch (e) {
    console.warn('inv load failed', e);
  }
}

async function invPoll() {
  try {
    const url = invLastUpdatedAt
      ? `${INV_ENDPOINT}?select=*&updated_at=gt.${encodeURIComponent(invLastUpdatedAt)}`
      : `${INV_ENDPOINT}?select=*`;
    const res = await fetch(url, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!rows || rows.length === 0) return;
    // Merge updates
    let changed = false;
    rows.forEach(r => {
      const idx = inventory.findIndex(x => x.id === r.id);
      if (idx >= 0) inventory[idx] = r; else inventory.push(r);
      if (!invLastUpdatedAt || r.updated_at > invLastUpdatedAt) invLastUpdatedAt = r.updated_at;
      changed = true;
    });
    if (changed) {
      renderInventory();
      renderBanner();
      if (activeTab === 'units') render();
    }
  } catch (e) {
    // silent — unit poll will flip to offline if it matters
  }
}

async function invUpsert(item) {
  const payload = { ...item, updated_at: new Date().toISOString() };
  try {
    const res = await fetch(`${INV_ENDPOINT}?on_conflict=id`, {
      method: 'POST',
      headers: { ...supaHeaders, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) {
      const idx = inventory.findIndex(x => x.id === rows[0].id);
      if (idx >= 0) inventory[idx] = rows[0]; else inventory.push(rows[0]);
      if (!invLastUpdatedAt || rows[0].updated_at > invLastUpdatedAt) invLastUpdatedAt = rows[0].updated_at;
    }
  } catch (e) {
    console.warn('inv upsert failed', e);
  }
}

async function invDelete(id) {
  inventory = inventory.filter(x => x.id !== id);
  renderInventory();
  try {
    await fetch(`${INV_ENDPOINT}?id=eq.${id}`, { method: 'DELETE', headers: supaHeaders });
  } catch (e) { console.warn('inv delete failed', e); }
}

  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const swap = () => {
    outgoing.style.display = 'none';
    outgoing.classList.remove('view-fading');
    incoming.style.display = '';
    incoming.classList.add('view-fading');
    document.getElementById('addUnitBtn').style.display = tab === 'units' ? '' : 'none';

    // Next frame: remove fade class so it crossfades in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => incoming.classList.remove('view-fading'));
    });
  };

  if (reduce) { swap(); return; }
  outgoing.classList.add('view-fading');
  setTimeout(swap, 180);
}

/* ---------- State ---------- */
let state = load();
let filter = 'active';
let query = '';
let editingId = null; // unit id being edited; null = new

function clone(x) { return JSON.parse(JSON.stringify(x)); }
function load() {
  // We still keep a local cache so the app opens instantly while the cloud loads.
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) { console.warn('load failed', e); }
  return clone(SEED);
}
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.warn('save failed', e); }
}
// `save()` now persists locally AND syncs to the cloud.
function save() {
  saveLocal();

}

/* ---------- Helpers ---------- */
const statusClass = s => ({
  'Not Started': 'status-not',
  'In Progress': 'status-progress',
  'Waiting on Part': 'status-part',
  'Waiting on Vendor': 'status-vendor',
  'Done': 'status-done'
}[s] || 'status-not');

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function findUnit(id){ return state.find(u => u.id === id); }

function filterUnits() {
  const q = query.trim().toLowerCase();
  return state.filter(u => {
    // Three-tab filter:
    //   Active    = Not Started or In Progress (anything being worked, not blocked, not done)
    //   On Hold   = Waiting on Part or Waiting on Vendor
    //   Completed = Done only
    if (filter === 'Done') {
      if (u.status !== 'Done') return false;
    } else if (filter === 'hold') {
      if (u.status !== 'Waiting on Part' && u.status !== 'Waiting on Vendor') return false;
    } else if (filter === 'active') {
      if (u.status !== 'Not Started' && u.status !== 'In Progress') return false;
    } else {
      if (u.status !== filter) return false;
    }
    if (!q) return true;
    const hay = [
      u.id, u.category, u.status, u.blocker, u.next, u.vendor,
      ...(u.items || []).map(i => i.t)
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

/* ---------- Render ---------- */
function render() {
  const root = document.getElementById('cards');
  const units = filterUnits();

  // summary
  const total = state.length;
  const done = state.filter(u => u.status === 'Done').length;
  const openItems = state.reduce((n,u) => n + (u.items||[]).filter(i => !i.d).length, 0);
  document.getElementById('summary').textContent =
    `${total} unit${total===1?'':'s'} · ${openItems} open item${openItems===1?'':'s'} · ${done} done`;

  if (units.length === 0) {
    const msg = filter === 'Done'
      ? 'No completed units yet. Finish one and it\u2019ll land here.'
      : (query ? 'Nothing matches. Clear search or filter.' : 'All clear. Tap + to add a unit.');
    root.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  // --- Sort and group by urgency (days until move-in) ---
  // Completed tab: newest-finished first (most recent move-in descending, undated last)
  // Everything else: most urgent first, bucketed into 4 groups
  const bucketOf = (u) => {
    const d = daysUntil(u.moveIn);
    if (d === null) return 3;          // no date
    if (d <= 1) return 0;              // overdue / today / tomorrow
    if (d <= 7) return 1;              // this week
    return 2;                          // later
  };
  const bucketLabels = [
    'Overdue / Today',
    'This week',
    'Later',
    'No move-in date',
  ];

  let grouped;
  if (filter === 'Done') {
    // single flat group, most recently due first (completed newest feels right)
    const sorted = [...units].sort((a, b) => {
      const da = daysUntil(a.moveIn);
      const db = daysUntil(b.moveIn);
      if (da === null && db === null) return 0;
      if (da === null) return 1;
      if (db === null) return -1;
      return db - da; // descending
    });
    grouped = [{ label: null, units: sorted }];
  } else {
    const buckets = [[], [], [], []];
    for (const u of units) buckets[bucketOf(u)].push(u);
    // sort each bucket ascending by daysUntil (soonest first); undated bucket keeps insertion order
    for (let i = 0; i < 3; i++) {
      buckets[i].sort((a, b) => daysUntil(a.moveIn) - daysUntil(b.moveIn));
    }
    grouped = buckets
      .map((us, i) => ({ label: bucketLabels[i], key: i, units: us }))
      .filter(g => g.units.length > 0);
  }

  const renderCard = (u) => {
    const items = u.items || [];
    const open = items.filter(i => !i.d);
    const closed = items.filter(i => i.d);
    const total = items.length;
    const pct = total ? Math.round((closed.length / total) * 100) : 0;
    return `
      <article class="card" data-id="${escapeHtml(u.id)}">
        <div class="card-head">
          <div class="unit-id">
            ${escapeHtml(u.id)}
            <small>${escapeHtml(u.category || 'Unit')}</small>
          </div>
          <span class="status-pill ${statusClass(u.status)}">${escapeHtml(u.status)}</span>
        </div>

        ${(() => {
          const rows = [];
          if (u.moveIn) rows.push(`
            <div class="row">
              <div class="label">Move-in</div>
              <div class="value">${formatMoveIn(u.moveIn)}${moveInBadge(u.moveIn)}</div>
            </div>`);
          if (u.blocker) rows.push(`
            <div class="row">
              <div class="label">Blocker</div>
              <div class="value">${escapeHtml(u.blocker)}</div>
            </div>`);
          if (u.next) rows.push(`
            <div class="row">
              <div class="label">Next</div>
              <div class="value">${escapeHtml(u.next)}</div>
            </div>`);
          if (u.vendor) rows.push(`
            <div class="row">
              <div class="label">Vendor</div>
              <div class="value">${escapeHtml(u.vendor)}</div>
            </div>`);
          const missing = countMissingParts(items);
          if (missing > 0) rows.push(`
            <div class="row">
              <div class="label">Parts</div>
              <div class="value" style="color:var(--warn);font-weight:500;">
                ${missing} item${missing===1?'':'s'} waiting on parts
              </div>
            </div>`);
          const lowStock = lowStockForUnit(items);
          if (lowStock.length) {
            const names = lowStock.map(p => `${escapeHtml(p.name)} (${p.count})`).join(', ');
            rows.push(`
            <div class="low-stock-alert">
              <span class="low-stock-dot"></span>
              <span>Low stock: ${names}</span>
            </div>`);
          }
          return rows.length ? `<div class="meta">${rows.join('')}</div>` : '';
        })()}

        ${pct > 0 ? `<div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span>${closed.length}/${total} · ${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>` : ''}

        <div class="items">
          <div class="items-head">
            <span>Open</span>
            <span class="count">${open.length}</span>
          </div>
          ${open.length === 0
            ? `<div class="item" style="color:var(--ink-faint);font-style:italic;border:none;">All clear. Add next thing below.</div>`
            : open.map((i,idx) => itemHtml(i, items.indexOf(i))).join('')
          }

          <div class="add-item-row">
            <input type="text" placeholder="Add open item…" data-add-input />
            <button class="part-toggle" data-part-toggle aria-label="Tag as needing a part" title="Tag: needs a part"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg></button>
            <button data-add-btn>Add</button>
          </div>
          <input type="text" class="add-item-part-name" data-part-name placeholder="Part name (optional)…" />

          ${closed.length ? `
            <div class="items-head" style="margin-top:10px;">
              <span>Completed</span>
              <span class="count">${closed.length}</span>
            </div>
            ${closed.map(i => itemHtml(i, items.indexOf(i))).join('')}
          ` : ''}
        </div>

        <div class="card-actions">
          ${u.status === 'Done'
            ? `<button data-action="reopen" class="action-reopen">Reopen</button>`
            : `<button data-action="complete" class="action-complete">Mark Complete</button>`}
          <button data-action="edit">Edit</button>
          <button data-action="duplicate">Duplicate</button>
        </div>
      </article>
    `;
  };

  const groupClass = (key) => {
    if (key === 0) return 'urgency-urgent';
    if (key === 1) return 'urgency-soon';
    if (key === 2) return 'urgency-later';
    return 'urgency-none';
  };

  root.innerHTML = grouped.map(g => {
    const header = g.label
      ? `<div class="urgency-header ${groupClass(g.key)}">
           <span class="urgency-dot"></span>
           <span class="urgency-label">${g.label}</span>
           <span class="urgency-count">${g.units.length}</span>
         </div>`
      : '';
    return header + g.units.map(renderCard).join('');
  }).join('');

  applyRise(root, '.card', { stagger: 45, max: 10 });
}

function itemHtml(i, idx) {
  let partTag = '';
  if (i.part) {
    // If linked, show live count from inventory
    if (i.invId) {
      const inv = inventory.find(x => x.id === i.invId);
      if (inv) {
        const cls = invColor(inv.count);
        partTag = `<span class="count-tag ${cls}" title="Live count for ${escapeHtml(inv.name)}"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(inv.name)} · ${inv.count}</span>`;
      } else {
        // linked item was deleted from inventory
        partTag = `<span class="part-tag"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(i.partName || 'part')}</span>`;
      }
    } else {
      partTag = `<span class="part-tag" title="${escapeHtml(i.partName || 'Needs part')}"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(i.partName || 'part')}</span>`;
    }
  }
  return `
    <div class="item ${i.d ? 'done' : ''} ${i.part ? 'needs-part' : ''}" data-idx="${idx}">
      <button class="check" data-toggle aria-label="Toggle done">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
      <div class="item-text">${escapeHtml(i.t)}${partTag}</div>
      <button class="item-part-btn ${i.part ? 'active' : ''}" data-toggle-part aria-label="Tag as needing a part" title="Tag: needs a part"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button class="item-del" data-del aria-label="Delete item">×</button>
    </div>
  `;
}

/* ---------- Move-in helpers ---------- */
function parseDate(s) {
  if (!s) return null;
  // Treat as local date (avoid TZ shift)
  const [y, m, d] = s.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function daysUntil(s) {
  const d = parseDate(s);
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function formatMoveIn(s) {
  const d = parseDate(s);
  if (!d) return escapeHtml(s);
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}
function moveInBadge(s) {
  const days = daysUntil(s);
  if (days === null) return '';
  if (days < 0)  return `<span class="move-in past">${Math.abs(days)}d ago</span>`;
  if (days === 0) return `<span class="move-in urgent">Today</span>`;
  if (days === 1) return `<span class="move-in urgent">Tomorrow</span>`;
  if (days <= 3) return `<span class="move-in urgent">${days}d left</span>`;
  if (days <= 7) return `<span class="move-in soon">${days}d left</span>`;
  return `<span class="move-in ok">${days}d left</span>`;
}
function countMissingParts(items) {
  return (items || []).filter(i => i.part && !i.d).length;
}

// Returns inventory-linked items among OPEN items that are low (count ≤ 1).
// Returns [{name, count}]
function lowStockForUnit(items) {
  const open = (items || []).filter(i => !i.d && i.invId);
  const seen = new Set();
  const out = [];
  for (const it of open) {
    if (seen.has(it.invId)) continue;
    const inv = inventory.find(x => x.id === it.invId);
    if (inv && inv.count <= 1) {
      out.push({ name: inv.name, count: inv.count });
      seen.add(it.invId);
    }
  }
  return out;
}

document.getElementById('cards').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const unit = findUnit(id);
  if (!unit) return;

  // item toggle
  const toggle = e.target.closest('[data-toggle]');
  if (toggle) {
    const idx = +toggle.closest('.item').dataset.idx;
    const it = unit.items[idx];
    const willBeDone = !it.d;
    // If linking an item to inventory and marking done, ask-to-decrement
    if (willBeDone && it.part && it.invId) {
      const inv = inventory.find(x => x.id === it.invId);
      if (inv && inv.count > 0) {
        askDecrement(inv, () => {
          inv.count = Math.max(0, inv.count - 1);
          invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: inv.status || 'normal' });
          renderBanner();
        });
      }
    }
    it.d = willBeDone;
    // Auto-clear matching blocker from the CSV when the item is checked off
    if (willBeDone && unit.blocker) {
      const itemText = (it.t || '').trim().toLowerCase();
      const blockers = parseBlockers(unit.blocker);
      const remaining = blockers.filter(b => b.toLowerCase() !== itemText);
      if (remaining.length !== blockers.length) {
        unit.blocker = formatBlockers(remaining);
        if (!unit.blocker) {
          unit.vendor = '';
          if (unit.status === 'Waiting on Part' || unit.status === 'Waiting on Vendor') {
            unit.status = 'In Progress';
          }
        }
      }
    }
    save(); render();
    return;
  }
  // delete item
  const del = e.target.closest('[data-del]');
  if (del) {
    const idx = +del.closest('.item').dataset.idx;
    unit.items.splice(idx, 1);
    save(); render();
    return;
  }
  // toggle part flag on existing item
  const tp = e.target.closest('[data-toggle-part]');
  if (tp) {
    const idx = +tp.closest('.item').dataset.idx;
    const it = unit.items[idx];
    if (it.part) {
      it.part = false;
      delete it.partName;
      delete it.invId;
      autoFlipStatus(unit);
      save(); render();
    } else {
      // open inventory picker
      openPicker((choice) => {
        it.part = true;
        if (choice) {
          it.invId = choice.id;
          it.partName = choice.name;
        }
        autoFlipStatus(unit);
        save(); render();
      });
    }
    return;
  }
  // toggle the part flag on the add-row before clicking Add
  const partToggle = e.target.closest('[data-part-toggle]');
  if (partToggle) {
    partToggle.classList.toggle('active');
    const partInput = card.querySelector('[data-part-name]');
    if (partInput) partInput.classList.toggle('show', partToggle.classList.contains('active'));
    return;
  }
  // add item
  const addBtn = e.target.closest('[data-add-btn]');
  if (addBtn) {
    const input = card.querySelector('[data-add-input]');
    const t = input.value.trim();
    if (!t) return;
    const partOn = card.querySelector('[data-part-toggle]')?.classList.contains('active');
    const partNameTyped = card.querySelector('[data-part-name]')?.value.trim();
    const newItem = { t, d: false };
    if (partOn) {
      // Picker-first flow: open inventory picker, pre-fill search with typed part name
      openPicker((choice) => {
        newItem.part = true;
        if (choice) {
          newItem.invId = choice.id;
          newItem.partName = choice.name;
        } else if (partNameTyped) {
          newItem.partName = partNameTyped;
        }
        unit.items.push(newItem);
        autoFlipStatus(unit);
        save(); render();
      }, partNameTyped || '');
    } else {
      unit.items.push(newItem);
      autoFlipStatus(unit);
      save(); render();
    }
    return;
  }
  // card actions
  const act = e.target.closest('[data-action]');
  if (act) {
    const a = act.dataset.action;
    if (a === 'edit') openModal(unit);
    if (a === 'complete') {
      unit.status = 'Done';
      // Also mark every open item done so progress reads 100%.
      (unit.items || []).forEach(i => i.d = true);
      save(); render();
    }
    if (a === 'reopen') {
      unit.status = 'In Progress';
      save(); render();
    }
    if (a === 'duplicate') {
      const copy = clone(unit);
      copy.id = uniqueId(unit.id + '-copy');
      copy.status = 'Not Started';
      copy.items = (copy.items || []).map(i => ({ t: i.t, d: false }));
      state.unshift(copy);
      save(); render();
    }
  }
});

function uniqueId(base) {
  let id = base, n = 2;
  while (state.some(u => u.id === id)) { id = `${base} ${n++}`; }
  return id;
}

// If any open item is flagged as missing a part, nudge the unit's status
// to "Waiting on Part" (unless it's Done). If parts get cleared and the
// status was Waiting on Part, drop back to In Progress.
function autoFlipStatus(unit) {
  const hasMissing = countMissingParts(unit.items) > 0;
  if (unit.status === 'Done') return;
  if (hasMissing) {
    unit.status = 'Waiting on Part';
  } else if (unit.status === 'Waiting on Part') {
    unit.status = 'In Progress';
  }
}

// Blocker helpers (CSV) — each comma-separated blocker behaves as its own punch item.
const BLOCKER_PRESETS = ['Counter resurfacing', 'Pest control', 'Paint contractor', 'Cleaners', 'Carpet'];
function parseBlockers(csv) {
  return (csv || '').split(',').map(s => s.trim()).filter(Boolean);
}
function formatBlockers(list) {
  return list.join(', ');
}
function hydrateBlockerChips(csv) {
  const list = parseBlockers(csv);
  const lowerSet = new Set(list.map(s => s.toLowerCase()));
  const presetLower = new Set(BLOCKER_PRESETS.map(s => s.toLowerCase()));
  document.querySelectorAll('#f-blocker-presets .blocker-chip').forEach(btn => {
    const on = lowerSet.has(btn.dataset.preset.toLowerCase());
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  const other = list.filter(b => !presetLower.has(b.toLowerCase()));
  f.blocker.value = formatBlockers(other);
}
function readBlockersFromForm() {
  const chips = Array.from(document.querySelectorAll('#f-blocker-presets .blocker-chip.on')).map(b => b.dataset.preset);
  const other = parseBlockers(f.blocker.value);
  // Preserve chip order first, then custom entries
  return formatBlockers([...chips, ...other]);
}
// Chip click toggles selection
document.getElementById('f-blocker-presets').addEventListener('click', (e) => {
  const btn = e.target.closest('.blocker-chip');
  if (!btn) return;
  const on = !btn.classList.contains('on');
  btn.classList.toggle('on', on);
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
});
function syncBlockersToItems(unit) {
  const blockers = parseBlockers(unit.blocker);
  if (!blockers.length) return;
  unit.items = unit.items || [];
  for (const b of blockers) {
    const low = b.toLowerCase();
    const existing = unit.items.find(it => (it.t || '').trim().toLowerCase() === low);
    if (existing) {
      // reopen if it was done
      if (existing.d) existing.d = false;
    } else {
      unit.items.push({ t: b, d: false });
    }
  }
}

document.getElementById('f-save').addEventListener('click', () => {

    }
