<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#d3def0" />
<title>Aptreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Base (Amie-inspired sky palette) ---------- */
  :root {
    --bg: #e7ecf6;
    --bg-grad: linear-gradient(180deg, #d3def0 0%, #e5dff2 35%, #f4e4dd 70%, #fae7d4 100%);
    --surface: #ffffff;
    --surface-2: #f1efeb;
    --ink: #1b1a2e;
    --ink-soft: #5a5871;
    --ink-faint: #9a98ae;
    --line: rgba(27, 26, 46, 0.08);
    --line-strong: rgba(27, 26, 46, 0.14);
    --accent: #3aa885;      /* mint */
    --accent-soft: #dff3eb;
    --warn: #d68a4a;        /* peach */
    --warn-soft: #fbe7d5;
    --stop: #e35c57;        /* coral */
    --stop-soft: #fbdcd9;
    --done: #7a7890;
    --done-soft: #e7e5f0;
    --blue: #6a7ad1;        /* periwinkle */
    --blue-soft: #e0e3f5;
    --radius: 18px;
    --radius-lg: 22px;
    --shadow-sm: 0 1px 2px rgba(27,26,46,.04);
    --shadow: 0 2px 6px rgba(27,26,46,.05), 0 8px 24px rgba(27,26,46,.06);
    --shadow-lg: 0 8px 32px rgba(27,26,46,.10), 0 2px 8px rgba(27,26,46,.05);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #15131f;
    --bg-grad: linear-gradient(180deg, #1a1b2e 0%, #231c34 40%, #2d1f2a 75%, #2e2420 100%);
    --surface: #201e2f;
    --surface-2: #28253a;
    --ink: #efecf8;
    --ink-soft: #aaa6be;
    --ink-faint: #706d85;
    --line: rgba(239, 236, 248, 0.08);
    --line-strong: rgba(239, 236, 248, 0.15);
    --accent: #5ecaa5;
    --accent-soft: #243732;
    --warn: #e8a975;
    --warn-soft: #3a2d23;
    --stop: #ef8581;
    --stop-soft: #3a2624;
    --done: #9795ad;
    --done-soft: #2c2a3d;
    --blue: #8a9aea;
    --blue-soft: #232842;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow: 0 2px 6px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.2);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.2);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; color: var(--ink); }
  html { background: var(--bg); }
  body {
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.45;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height: 100vh;
    background: var(--bg-grad);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button, input, select, textarea { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }

  /* ---------- Layout ---------- */
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 14px 16px 120px;
  }

  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0 18px;
    gap: 12px;
  }
  header.top h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    line-height: 1.1;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6a7ad1 0%, #9a7bd1 50%, #d68a7e 100%);
    box-shadow: var(--shadow);
    font-size: 22px;
    flex: 0 0 auto;
  }
  header.top h1 span#summary {
    display: block;
    flex-basis: 100%;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }
  .sync {
    display: inline-block !important;
    margin-top: 4px !important;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px !important;
    font-weight: 500;
    letter-spacing: 0.03em;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink-soft);
  }
  .sync.synced { background: var(--accent-soft); color: var(--accent); }
  .sync.saving { background: var(--warn-soft); color: var(--warn); }
  .sync.offline { background: var(--stop-soft); color: var(--stop); }
  .theme-btn {
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    flex: 0 0 auto;
  }
  [data-theme="dark"] .theme-btn,
  [data-theme="dark"] .sync {
    background: rgba(40, 37, 58, 0.7);
  }

  /* ---------- Search + filters ---------- */
  .controls {
    position: sticky;
    top: 0;
    z-index: 5;
    padding: 8px 0 10px;
    margin-bottom: 6px;
    /* frosted so the gradient shows through */
    background: linear-gradient(180deg, rgba(231,236,246,0.92) 0%, rgba(231,236,246,0.7) 80%, rgba(231,236,246,0) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  [data-theme="dark"] .controls {
    background: linear-gradient(180deg, rgba(21,19,31,0.92) 0%, rgba(21,19,31,0.7) 80%, rgba(21,19,31,0) 100%);
  }
  .search {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--line);
    outline: none;
    font-size: 16px;
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .search { background: rgba(32, 30, 47, 0.85); }
  .search:focus { border-color: var(--line-strong); }
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 2px 4px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .chip { background: rgba(32, 30, 47, 0.75); }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  [data-theme="dark"] .chip[aria-pressed="true"] { color: var(--bg); }

  /* ---------- Cards ---------- */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 14px 10px;
  }
  .unit-id {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .unit-id small {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-faint);
    margin-top: 3px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .status-pill {
    align-self: flex-start;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status-not       { background: var(--done-soft); color: var(--done); }
  .status-progress  { background: var(--accent-soft); color: var(--accent); }
  .status-part      { background: var(--warn-soft); color: var(--warn); }
  .status-vendor    { background: var(--blue-soft); color: var(--blue); }
  .status-done      { background: var(--done-soft); color: var(--done); text-decoration: none; }

  .meta {
    padding: 0 14px 4px;
    font-size: 14px;
  }
  .meta .row {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-top: 1px dashed var(--line);
  }
  .meta .row:first-child { border-top: none; }
  .meta .label {
    flex: 0 0 80px;
    color: var(--ink-faint);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 2px;
  }

  /* Move-in date badges */
  .move-in {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
    margin-top: 4px;
  }
  .move-in.urgent { background: var(--stop-soft); color: var(--stop); }
  .move-in.soon   { background: var(--warn-soft); color: var(--warn); }
  .move-in.ok     { background: var(--accent-soft); color: var(--accent); }
  .move-in.past   { background: var(--done-soft); color: var(--done); }

  /* Missing-part item flag */
  .item.needs-part .item-text {
    color: var(--warn);
  }
  .part-tag {
    display: inline-block;
    margin-left: 6px;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--warn-soft);
    color: var(--warn);
    font-weight: 500;
    letter-spacing: 0.02em;
    vertical-align: middle;
  }
  .item-part-btn {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0.55;
    transition: opacity 120ms, color 120ms, background 120ms;
  }
  .item-part-btn:hover { opacity: 0.9; }
  .item-part-btn.active {
    opacity: 1;
    color: var(--warn);
    background: var(--warn-soft);
  }
  .item-part-btn svg, .add-item-row .part-toggle svg { width: 18px; height: 18px; display: block; }
  .tag-glyph { width: 12px; height: 12px; display: inline-block; vertical-align: -2px; margin-right: 3px; opacity: 0.9; }
  .add-item-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }
  .add-item-row input[data-add-input] {
    flex: 1;
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
    min-width: 0;
  }
  .add-item-row .part-toggle {
    flex: 0 0 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 120ms, background 120ms, border-color 120ms;
  }
  .add-item-row .part-toggle.active {
    background: var(--warn-soft);
    color: var(--warn);
    border-color: var(--warn-soft);
  }
  .add-item-row button[data-add-btn] {
    flex: 0 0 auto;
    height: 42px;
    padding: 0 14px;
    border-radius: 10px;
    background: var(--ink);
    color: var(--bg);
    font-weight: 500;
  }
  .add-item-part-name {
    margin-top: 6px;
    width: 100%;
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px dashed var(--warn);
    background: var(--warn-soft);
    outline: none;
    font-size: 13px;
    color: var(--ink);
    display: none;
  }
  .add-item-part-name.show { display: block; }
  .meta .value { flex: 1; color: var(--ink); }
  .meta .value.empty { color: var(--ink-faint); font-style: italic; }

  /* ---------- Progress ---------- */
  .progress-wrap {
    padding: 8px 14px 12px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width .3s ease;
  }

  /* ---------- Items ---------- */
  .items {
    padding: 4px 14px 10px;
  }
  .items-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
  }
  .items-head .count {
    background: var(--surface-2);
    color: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.03em;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 2px;
    border-top: 1px solid var(--line);
    min-height: 44px;
  }
  .item:first-of-type { border-top: none; }
  .check {
    flex: 0 0 24px;
    height: 24px;
    margin-top: 1px;
    border-radius: 6px;
    border: 1.5px solid var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: all .15s ease;
  }
  .item.done .check {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .check svg { width: 14px; height: 14px; display: none; }
  .item.done .check svg { display: block; }
  .item-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    padding-top: 2px;
    word-break: break-word;
  }
  .item.done .item-text {
    color: var(--ink-faint);
    text-decoration: line-through;
  }
  .item-del {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    color: var(--ink-faint);
    font-size: 18px;
    opacity: 0;
    transition: opacity .15s;
  }
  .item:hover .item-del,
  .item:focus-within .item-del { opacity: 1; }

  .add-item {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .add-item input {
    flex: 1;
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
  }
  .add-item input:focus { border-color: var(--ink-faint); }
  .add-item button {
    height: 42px;
    padding: 0 14px;
    border-radius: 10px;
    background: var(--ink);
    color: var(--bg);
    font-weight: 500;
  }

  /* ---------- Card actions ---------- */
  .card-actions {
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--surface-2);
  }
  .card-actions button {
    flex: 1;
    height: 46px;
    font-size: 13px;
    color: var(--ink-soft);
    border-right: 1px solid var(--line);
  }
  .card-actions button:last-child { border-right: none; }
  .card-actions button:active { background: var(--line); }
  .card-actions .action-complete {
    color: var(--accent);
    font-weight: 500;
  }
  .card-actions .action-reopen {
    color: var(--warn);
    font-weight: 500;
  }

  /* ---------- Empty ---------- */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-size: 14px;
  }

  /* ---------- Floating add ---------- */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 20px;
    width: 62px;
    height: 62px;
    border-radius: 999px;
    background: linear-gradient(135deg, #6a7ad1 0%, #9a7bd1 55%, #d68a7e 100%);
    color: #fff;
    font-size: 30px;
    font-weight: 400;
    box-shadow: 0 8px 24px rgba(106, 122, 209, .35), 0 2px 6px rgba(27, 26, 46, .1);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .fab:active {
    transform: scale(0.96);
    box-shadow: 0 4px 14px rgba(106, 122, 209, .3);
  }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20, 18, 35, .32);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 20;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 24px; max-height: 86vh; }
  }
  .modal h2 {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 600;
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface-2);
    outline: none;
    font-size: 16px;
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--ink-faint); }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .modal-actions button {
    flex: 1;
    height: 48px;
    border-radius: 10px;
    font-weight: 500;
    font-size: 15px;
  }
  .btn-primary { background: var(--ink); color: white; }
  [data-theme="dark"] .btn-primary { color: var(--bg); }
  .btn-ghost { background: var(--surface-2); color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-danger { background: var(--stop-soft); color: var(--stop); }

  /* ---------- Top tab nav ---------- */
  .tabs {
    display: flex;
    gap: 4px;
    margin: 2px 0 14px;
    padding: 4px;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .tabs { background: rgba(32, 30, 47, 0.6); }
  .tabs button {
    flex: 1;
    height: 40px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all .18s ease;
  }
  .tabs button[aria-pressed="true"] {
    background: var(--surface);
    color: var(--ink);
    box-shadow: var(--shadow-sm);
    font-weight: 600;
  }

  /* ---------- Inventory ---------- */
  .inv-banner {
    margin: 0 0 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    background: var(--stop-soft);
    color: var(--stop);
    font-weight: 500;
    display: none;
    box-shadow: var(--shadow-sm);
  }
  .inv-banner.show { display: block; }
  .inv-group {
    margin-bottom: 18px;
  }
  .inv-group-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .inv-group.low .inv-group-head { color: var(--stop); }
  .inv-group.med .inv-group-head { color: var(--warn); }
  .inv-group.ok  .inv-group-head { color: var(--accent); }
  .inv-group-head .count {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--ink-faint);
  }
  .inv-list {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .inv-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
    min-height: 52px;
    background: var(--surface);
  }
  .inv-row:first-child { border-top: none; }
  .inv-row:active { background: var(--surface-2); }
  .inv-dot {
    flex: 0 0 10px;
    width: 10px;
    height: 10px;
    border-radius: 999px;
  }
  .inv-dot.low { background: var(--stop); }

<script>
/* ================================================================
   Aptreo — personal single-file tool
   Data lives in localStorage. Everything is plain state + render.
================================================================ */

const STORAGE_KEY = 'turn-tech-tracker/v1';
const THEME_KEY = 'turn-tech-tracker/theme';

/* ---------- Cloud sync (Supabase) ---------- */
const SUPABASE_URL = 'https://yglpobqgsjvrthtnnhrn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Uvc0cbE3zx_Szp7s883nCQ_xhoQrlNS';
const ROW_ID = 'main';
const REST_ENDPOINT = `${SUPABASE_URL}/rest/v1/turn_tech_tracker`;
const POLL_INTERVAL_MS = 2500; // how often to check for teammate updates

const supaHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

let lastRemoteStateJSON = null;  // to ignore our own echoes
let lastRemoteUpdatedAt = null;  // to skip unchanged rows
let saveTimer = null;
let pollTimer = null;
let isSaving = false;

function setSync(status, label) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync ' + status;
  el.textContent = label;
}

async function cloudLoad(attempt=0) {
  setSync('saving', 'Loading…');
  try {
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}&select=state,updated_at`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) {
      const remote = rows[0].state;
      lastRemoteUpdatedAt = rows[0].updated_at;
      if (Array.isArray(remote) && remote.length > 0) {
        state = remote;
        lastRemoteStateJSON = JSON.stringify(remote);
        saveLocal();
        render();
      } else {
        // First-ever sync — push whatever we have up.
        await cloudPush(true);
      }
    }
    setSync('synced', 'Synced');
  } catch (e) {
    console.warn('cloud load failed (attempt ' + attempt + ')', e);
    if (attempt < 3) {
      // Silent retry with backoff — avoids a flash of Offline on slow first load.
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
      return cloudLoad(attempt + 1);
    }
    setSync('offline', 'Offline');
  }
}

// Check the cloud for teammate changes. Runs on a timer.
async function cloudPoll() {
  if (isSaving) return; // don't fight our own in-flight write
  try {
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}&select=state,updated_at`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!rows || !rows[0]) return;
    const remoteUpdatedAt = rows[0].updated_at;
    if (remoteUpdatedAt === lastRemoteUpdatedAt) {
      // Nothing new, but request succeeded — clear any stale Offline state.
      const el = document.getElementById('syncStatus');
      if (el && el.classList.contains('offline')) setSync('synced', 'Synced');
      return;
    }
    const remote = rows[0].state;
    const remoteJSON = JSON.stringify(remote);
    lastRemoteUpdatedAt = remoteUpdatedAt;
    // Ignore if it's our own echo.
    if (remoteJSON === JSON.stringify(state)) {
      lastRemoteStateJSON = remoteJSON;
      setSync('synced', 'Synced');
      return;
    }
    // Pull teammate's changes in.
    state = remote;
    lastRemoteStateJSON = remoteJSON;
    saveLocal();
    render();
    setSync('synced', 'Updated');
    setTimeout(() => setSync('synced', 'Synced'), 1500);
  } catch (e) {
    setSync('offline', 'Offline');
  }
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(cloudPoll, POLL_INTERVAL_MS);
  // Also refresh immediately when the tab regains focus — faster feel on mobile.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') cloudPoll();
  });
}

async function cloudPush(initial=false) {
  const payload = JSON.stringify(state);
  if (payload === lastRemoteStateJSON && !initial) return;
  setSync('saving', 'Saving…');
  isSaving = true;
  try {
    const nowIso = new Date().toISOString();
    const res = await fetch(`${REST_ENDPOINT}?id=eq.${ROW_ID}`, {
      method: 'PATCH',
      headers: { ...supaHeaders, 'Prefer': 'return=representation' },
      body: JSON.stringify({ state, updated_at: nowIso })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) lastRemoteUpdatedAt = rows[0].updated_at;
    lastRemoteStateJSON = payload;
    setSync('synced', 'Synced');
  } catch (e) {
    console.warn('cloud push failed', e);
    setSync('offline', 'Offline — retrying');
    setTimeout(() => cloudPush(), 3000);
  } finally {
    isSaving = false;
  }
}

function scheduleCloudPush() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudPush, 400);
}

/* ---------- Inventory cloud sync ---------- */
const INV_ENDPOINT = `${SUPABASE_URL}/rest/v1/inventory_items`;
let inventory = [];           // [{id,name,count,supplier,status,...}]
let invLastUpdatedAt = null;  // newest updated_at we've seen
let invSaveTimers = {};       // per-id debounce

function invColor(c) {
  if (c <= 1) return 'low';
  if (c <= 4) return 'med';
  return 'ok';
}
function invId() {
  return 'i_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

async function invLoad() {
  try {
    const res = await fetch(`${INV_ENDPOINT}?select=*&order=name.asc`, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    inventory = rows || [];
    invLastUpdatedAt = inventory.reduce((max, r) => r.updated_at > max ? r.updated_at : max, '');
    renderInventory();
    renderBanner();
    render(); // unit view may show linked count tags
  } catch (e) {
    console.warn('inv load failed', e);
  }
}

async function invPoll() {
  try {
    const url = invLastUpdatedAt
      ? `${INV_ENDPOINT}?select=*&updated_at=gt.${encodeURIComponent(invLastUpdatedAt)}`
      : `${INV_ENDPOINT}?select=*`;
    const res = await fetch(url, { headers: supaHeaders, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!rows || rows.length === 0) return;
    // Merge updates
    let changed = false;
    rows.forEach(r => {
      const idx = inventory.findIndex(x => x.id === r.id);
      if (idx >= 0) inventory[idx] = r; else inventory.push(r);
      if (!invLastUpdatedAt || r.updated_at > invLastUpdatedAt) invLastUpdatedAt = r.updated_at;
      changed = true;
    });
    if (changed) {
      renderInventory();
      renderBanner();
      if (activeTab === 'units') render();
    }
  } catch (e) {
    // silent — unit poll will flip to offline if it matters
  }
}

async function invUpsert(item) {
  const payload = { ...item, updated_at: new Date().toISOString() };
  try {
    const res = await fetch(`${INV_ENDPOINT}?on_conflict=id`, {
      method: 'POST',
      headers: { ...supaHeaders, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows[0]) {
      const idx = inventory.findIndex(x => x.id === rows[0].id);
      if (idx >= 0) inventory[idx] = rows[0]; else inventory.push(rows[0]);
      if (!invLastUpdatedAt || rows[0].updated_at > invLastUpdatedAt) invLastUpdatedAt = rows[0].updated_at;
    }
  } catch (e) {
    console.warn('inv upsert failed', e);
  }
}

async function invDelete(id) {
  inventory = inventory.filter(x => x.id !== id);
  renderInventory();
  try {
    await fetch(`${INV_ENDPOINT}?id=eq.${id}`, { method: 'DELETE', headers: supaHeaders });
  } catch (e) { console.warn('inv delete failed', e); }
}

/* ---------- State ---------- */
let state = load();
let filter = 'active';
let query = '';
let editingId = null; // unit id being edited; null = new

function clone(x) { return JSON.parse(JSON.stringify(x)); }
function load() {
  // We still keep a local cache so the app opens instantly while the cloud loads.
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) { console.warn('load failed', e); }
  return clone(SEED);
}
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.warn('save failed', e); }
}
// `save()` now persists locally AND syncs to the cloud.
function save() {
  saveLocal();
  scheduleCloudPush();
}

/* ---------- Helpers ---------- */
const statusClass = s => ({
  'Not Started': 'status-not',
  'In Progress': 'status-progress',

}[s] || 'status-not');

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function findUnit(id){ return state.find(u => u.id === id); }

function filterUnits() {
  const q = query.trim().toLowerCase();
  return state.filter(u => {
    // Completed tab shows ONLY done units.
    // Any other tab hides done units entirely.
    if (filter === 'Done') {

    } else {

    }
    if (!q) return true;
    const hay = [
      u.id, u.category, u.status, u.blocker, u.next, u.vendor,
      ...(u.items || []).map(i => i.t)
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

/* ---------- Render ---------- */
function render() {
  const root = document.getElementById('cards');
  const units = filterUnits();

  // summary
  const total = state.length;
  const done = state.filter(u => u.status === 'Done').length;
  const openItems = state.reduce((n,u) => n + (u.items||[]).filter(i => !i.d).length, 0);
  document.getElementById('summary').textContent =
    `${total} unit${total===1?'':'s'} · ${openItems} open item${openItems===1?'':'s'} · ${done} done`;

  if (units.length === 0) {
    const msg = filter === 'Done'
      ? 'No completed units yet. Finish one and it\u2019ll land here.'
      : (query ? 'Nothing matches. Clear search or filter.' : 'All clear. Tap + to add a unit.');
    root.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  root.innerHTML = units.map(u => {
    const items = u.items || [];
    const open = items.filter(i => !i.d);
    const closed = items.filter(i => i.d);
    const total = items.length;
    const pct = total ? Math.round((closed.length / total) * 100) : 0;

    return `
      <article class="card" data-id="${escapeHtml(u.id)}">
        <div class="card-head">
          <div class="unit-id">
            ${escapeHtml(u.id)}
            <small>${escapeHtml(u.category || 'Unit')}</small>
          </div>
          <span class="status-pill ${statusClass(u.status)}">${escapeHtml(u.status)}</span>
        </div>

        <div class="meta">
          ${u.moveIn ? `
          <div class="row">
            <div class="label">Move-in</div>
            <div class="value">
              ${formatMoveIn(u.moveIn)}
              ${moveInBadge(u.moveIn)}
            </div>
          </div>` : ''}
          <div class="row">
            <div class="label">Blocker</div>
            <div class="value ${u.blocker ? '' : 'empty'}">${escapeHtml(u.blocker || 'None')}</div>
          </div>
          <div class="row">
            <div class="label">Next</div>
            <div class="value ${u.next ? '' : 'empty'}">${escapeHtml(u.next || '—')}</div>
          </div>
          ${u.vendor ? `
          <div class="row">
            <div class="label">Vendor</div>
            <div class="value">${escapeHtml(u.vendor)}</div>
          </div>` : ''}
          ${countMissingParts(items) > 0 ? `
          <div class="row">
            <div class="label">Parts</div>
            <div class="value" style="color:var(--warn);font-weight:500;">
              ${countMissingParts(items)} item${countMissingParts(items)===1?'':'s'} waiting on parts
            </div>
          </div>` : ''}
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span>${closed.length}/${total} · ${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>

        <div class="items">
          <div class="items-head">
            <span>Open</span>
            <span class="count">${open.length}</span>
          </div>
          ${open.length === 0
            ? `<div class="item" style="color:var(--ink-faint);font-style:italic;border:none;">All clear. Add next thing below.</div>`
            : open.map((i,idx) => itemHtml(i, items.indexOf(i))).join('')
          }

          <div class="add-item-row">
            <input type="text" placeholder="Add open item…" data-add-input />
            <button class="part-toggle" data-part-toggle aria-label="Tag as needing a part" title="Tag: needs a part"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg></button>
            <button data-add-btn>Add</button>
          </div>
          <input type="text" class="add-item-part-name" data-part-name placeholder="Part name (optional)…" />

          ${closed.length ? `
            <div class="items-head" style="margin-top:10px;">
              <span>Completed</span>
              <span class="count">${closed.length}</span>
            </div>
            ${closed.map(i => itemHtml(i, items.indexOf(i))).join('')}
          ` : ''}
        </div>

        <div class="card-actions">
          ${u.status === 'Done'
            ? `<button data-action="reopen" class="action-reopen">Reopen</button>`
            : `<button data-action="complete" class="action-complete">Mark Complete</button>`}
          <button data-action="edit">Edit</button>
          <button data-action="duplicate">Duplicate</button>
        </div>
      </article>
    `;
  }).join('');
}

function itemHtml(i, idx) {
  let partTag = '';
  if (i.part) {
    // If linked, show live count from inventory
    if (i.invId) {
      const inv = inventory.find(x => x.id === i.invId);
      if (inv) {
        const cls = invColor(inv.count);
        partTag = `<span class="count-tag ${cls}" title="Live count for ${escapeHtml(inv.name)}"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(inv.name)} · ${inv.count}</span>`;
      } else {
        // linked item was deleted from inventory
        partTag = `<span class="part-tag"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(i.partName || 'part')}</span>`;
      }
    } else {
      partTag = `<span class="part-tag" title="${escapeHtml(i.partName || 'Needs part')}"><svg class="tag-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg> ${escapeHtml(i.partName || 'part')}</span>`;
    }
  }
  return `
    <div class="item ${i.d ? 'done' : ''} ${i.part ? 'needs-part' : ''}" data-idx="${idx}">
      <button class="check" data-toggle aria-label="Toggle done">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
      <div class="item-text">${escapeHtml(i.t)}${partTag}</div>
      <button class="item-part-btn ${i.part ? 'active' : ''}" data-toggle-part aria-label="Tag as needing a part" title="Tag: needs a part"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button class="item-del" data-del aria-label="Delete item">×</button>
    </div>
  `;
}

/* ---------- Move-in helpers ---------- */
function parseDate(s) {
  if (!s) return null;
  // Treat as local date (avoid TZ shift)
  const [y, m, d] = s.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function daysUntil(s) {
  const d = parseDate(s);
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function formatMoveIn(s) {
  const d = parseDate(s);
  if (!d) return escapeHtml(s);
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}
function moveInBadge(s) {
  const days = daysUntil(s);
  if (days === null) return '';
  if (days < 0)  return `<span class="move-in past">${Math.abs(days)}d ago</span>`;
  if (days === 0) return `<span class="move-in urgent">Today</span>`;
  if (days === 1) return `<span class="move-in urgent">Tomorrow</span>`;
  if (days <= 3) return `<span class="move-in urgent">${days}d left</span>`;
  if (days <= 7) return `<span class="move-in soon">${days}d left</span>`;
  return `<span class="move-in ok">${days}d left</span>`;
}
function countMissingParts(items) {
  return (items || []).filter(i => i.part && !i.d).length;
}

/* ---------- Events ---------- */
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  filter = btn.dataset.filter;
  document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', c === btn ? 'true' : 'false'));
  render();
});

document.getElementById('cards').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const unit = findUnit(id);
  if (!unit) return;

  // item toggle
  const toggle = e.target.closest('[data-toggle]');
  if (toggle) {
    const idx = +toggle.closest('.item').dataset.idx;
    const it = unit.items[idx];
    const willBeDone = !it.d;
    // If linking an item to inventory and marking done, ask-to-decrement
    if (willBeDone && it.part && it.invId) {
      const inv = inventory.find(x => x.id === it.invId);
      if (inv && inv.count > 0) {
        askDecrement(inv, () => {
          inv.count = Math.max(0, inv.count - 1);
          invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: inv.status || 'normal' });
          renderBanner();
        });
      }
    }
    it.d = willBeDone;
    save(); render();
    return;
  }
  // delete item
  const del = e.target.closest('[data-del]');
  if (del) {
    const idx = +del.closest('.item').dataset.idx;
    unit.items.splice(idx, 1);
    save(); render();
    return;
  }
  // toggle part flag on existing item
  const tp = e.target.closest('[data-toggle-part]');
  if (tp) {
    const idx = +tp.closest('.item').dataset.idx;
    const it = unit.items[idx];
    if (it.part) {
      it.part = false;
      delete it.partName;
      delete it.invId;
      autoFlipStatus(unit);
      save(); render();
    } else {
      // open inventory picker
      openPicker((choice) => {
        it.part = true;
        if (choice) {
          it.invId = choice.id;
          it.partName = choice.name;
        }
        autoFlipStatus(unit);
        save(); render();
      });
    }
    return;
  }
  // toggle the part flag on the add-row before clicking Add
  const partToggle = e.target.closest('[data-part-toggle]');
  if (partToggle) {
    partToggle.classList.toggle('active');
    const partInput = card.querySelector('[data-part-name]');
    if (partInput) partInput.classList.toggle('show', partToggle.classList.contains('active'));
    return;
  }
  // add item
  const addBtn = e.target.closest('[data-add-btn]');
  if (addBtn) {
    const input = card.querySelector('[data-add-input]');
    const t = input.value.trim();
    if (!t) return;
    const partOn = card.querySelector('[data-part-toggle]')?.classList.contains('active');
    const partNameTyped = card.querySelector('[data-part-name]')?.value.trim();
    const newItem = { t, d: false };
    if (partOn) {
      // Picker-first flow: open inventory picker, pre-fill search with typed part name
      openPicker((choice) => {
        newItem.part = true;
        if (choice) {
          newItem.invId = choice.id;
          newItem.partName = choice.name;
        } else if (partNameTyped) {
          newItem.partName = partNameTyped;
        }
        unit.items.push(newItem);
        autoFlipStatus(unit);
        save(); render();
      }, partNameTyped || '');
    } else {
      unit.items.push(newItem);
      autoFlipStatus(unit);
      save(); render();
    }
    return;
  }
  // card actions
  const act = e.target.closest('[data-action]');
  if (act) {
    const a = act.dataset.action;
    if (a === 'edit') openModal(unit);
    if (a === 'complete') {
      unit.status = 'Done';
      // Also mark every open item done so progress reads 100%.
      (unit.items || []).forEach(i => i.d = true);
      save(); render();
    }
    if (a === 'reopen') {
      unit.status = 'In Progress';
      save(); render();
    }
    if (a === 'duplicate') {
      const copy = clone(unit);
      copy.id = uniqueId(unit.id + '-copy');
      copy.status = 'Not Started';
      copy.items = (copy.items || []).map(i => ({ t: i.t, d: false }));
      state.unshift(copy);
      save(); render();
    }
  }
});

// Enter key in add-item input
document.getElementById('cards').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.matches('[data-add-input]')) {
    e.preventDefault();
    e.target.closest('.add-item').querySelector('[data-add-btn]').click();
  }
});

function uniqueId(base) {
  let id = base, n = 2;
  while (state.some(u => u.id === id)) { id = `${base} ${n++}`; }
  return id;
}

// If any open item is flagged as missing a part, nudge the unit's status
// to "Waiting on Part" (unless it's Done). If parts get cleared and the
// status was Waiting on Part, drop back to In Progress.
function autoFlipStatus(unit) {
  const hasMissing = countMissingParts(unit.items) > 0;
  if (unit.status === 'Done') return;
  if (hasMissing) {
    unit.status = 'Waiting on Part';
  } else if (unit.status === 'Waiting on Part') {
    unit.status = 'In Progress';
  }
}

const modal = document.getElementById('unitModal');
const f = {
  id: document.getElementById('f-id'),
  category: document.getElementById('f-category'),

  blocker: document.getElementById('f-blocker'),
  next: document.getElementById('f-next'),

};

function openModal(unit) {
  editingId = unit ? unit.id : null;
  document.getElementById('modalTitle').textContent = unit ? `Edit ${unit.id}` : 'New Unit';
  document.getElementById('f-delete').style.display = unit ? '' : 'none';
  f.id.value = unit ? unit.id : '';
  f.category.value = unit ? unit.category || '' : 'Go Backs';
  f.status.value = unit ? unit.status : 'Not Started';
  f.blocker.value = unit ? unit.blocker || '' : '';
  f.next.value = unit ? unit.next || '' : '';
  f.vendor.value = unit ? unit.vendor || '' : '';
  f.moveIn.value = unit ? unit.moveIn || '' : '';
  modal.classList.add('open');
  // Skip autofocus on touch devices — iOS Safari sometimes fights the keyboard
  // and it can look like the modal "didn't open". User can tap the field.
  if (!('ontouchstart' in window)) {
    setTimeout(() => f.id.focus(), 50);
  }
}
function closeModal() { modal.classList.remove('open'); editingId = null; }

document.getElementById('addUnitBtn').addEventListener('click', (e) => { e.preventDefault(); openModal(null); });
document.getElementById('f-cancel').addEventListener('click', closeModal);
// Only close when tapping the dark backdrop itself (not any child element).
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
// Prevent bubbling from the modal content to the backdrop on iOS Safari.
document.querySelector('#unitModal .modal').addEventListener('click', e => e.stopPropagation());

document.getElementById('f-save').addEventListener('click', () => {
  const newId = f.id.value.trim();
  if (!newId) { f.id.focus(); return; }

  if (editingId) {
    const u = findUnit(editingId);
    if (!u) return;
    // handle rename
    if (newId !== editingId && state.some(x => x.id === newId)) {
      alert('That unit number already exists.');
      return;
    }
    u.id = newId;
    u.category = f.category.value.trim();
    u.status = f.status.value;
    u.blocker = f.blocker.value.trim();
    u.next = f.next.value.trim();
    u.vendor = f.vendor.value.trim();
    u.moveIn = f.moveIn.value || '';
  } else {
    if (state.some(x => x.id === newId)) {
      alert('That unit number already exists.');
      return;
    }
    state.unshift({
      id: newId,
      category: f.category.value.trim(),
      status: f.status.value,
      blocker: f.blocker.value.trim(),
      next: f.next.value.trim(),
      vendor: f.vendor.value.trim(),
      moveIn: f.moveIn.value || '',
      items: []
    });
  }
  save(); render(); closeModal();
});

document.getElementById('f-delete').addEventListener('click', () => {
  if (!editingId) return;
  if (!confirm(`Delete unit ${editingId}? This can't be undone.`)) return;
  state = state.filter(u => u.id !== editingId);
  save(); render(); closeModal();
});

  );

/* ---------- Inventory render ---------- */
let invQuery = '';

function renderInventory() {
  const root = document.getElementById('invList');
  if (!root) return;
  const q = invQuery.trim().toLowerCase();
  const filtered = inventory.filter(x => !q || (x.name || '').toLowerCase().includes(q));

  if (filtered.length === 0) {
    root.innerHTML = `<div class="empty">${inventory.length === 0 ? 'No inventory yet. Tap + to add.' : 'Nothing matches. Clear search.'}</div>`;
    return;
  }

  // Sort by color group (low first) then name
  const groups = { low: [], med: [], ok: [] };
  filtered.forEach(x => groups[invColor(x.count)].push(x));
  Object.keys(groups).forEach(k => groups[k].sort((a, b) => a.count - b.count || a.name.localeCompare(b.name)));

  const groupLabel = { low: 'Low (0–1)', med: 'Medium (2–4)', ok: 'Stocked (5+)' };
  root.innerHTML = ['low', 'med', 'ok'].filter(g => groups[g].length).map(g => `
    <div class="inv-group ${g}">
      <div class="inv-group-head">
        <span>${groupLabel[g]}</span>
        <span class="count">${groups[g].length}</span>
      </div>
      <div class="inv-list">
        ${groups[g].map(x => `
          <div class="inv-row" data-inv-id="${escapeHtml(x.id)}">
            <div class="inv-dot ${g}"></div>
            <div class="inv-name">${escapeHtml(x.name)}${x.supplier ? ` <span style="font-size:12px;color:var(--ink-faint);">· ${escapeHtml(x.supplier)}</span>` : ''}</div>
            <div class="inv-count ${g}">${x.count}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderBanner() {
  const banner = document.getElementById('invBanner');
  if (!banner) return;
  const lows = inventory.filter(x => x.count <= 1);
  if (lows.length === 0) {
    banner.classList.remove('show');
    banner.textContent = '';
    return;
  }
  const names = lows.slice(0, 3).map(x => x.name).join(', ');
  const more = lows.length > 3 ? ` and ${lows.length - 3} more` : '';
  banner.textContent = `${lows.length} item${lows.length === 1 ? '' : 's'} low: ${names}${more}`;
  banner.classList.add('show');
}

let sheetInvId = null;
document.getElementById('invList').addEventListener('click', e => {
  const row = e.target.closest('.inv-row');
  if (!row) return;
  openSheet(row.dataset.invId);
});

function openSheet(id) {
  const inv = inventory.find(x => x.id === id);
  if (!inv) return;
  sheetInvId = id;
  document.getElementById('sheet-name').textContent = inv.name;
  document.getElementById('sheet-sub').textContent = inv.supplier ? `Supplier: ${inv.supplier}` : 'Tap + / − to adjust';
  document.getElementById('sheet-qty').textContent = inv.count;
  document.getElementById('invSheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('invSheet').classList.remove('open');
  sheetInvId = null;
}

const invSheet = document.getElementById('invSheet');
invSheet.addEventListener('click', e => { if (e.target === invSheet) closeSheet(); });
// Attach action delegation to the inner .modal (stopPropagation on .modal would otherwise block backdrop clicks)
invSheet.querySelector('.modal').addEventListener('click', e => e.stopPropagation());

invSheet.querySelector('.modal').addEventListener('click', e => {
  const qty = e.target.closest('[data-qty]');
  if (qty && sheetInvId) {
    const inv = inventory.find(x => x.id === sheetInvId);
    if (!inv) return;
    const delta = +qty.dataset.qty;
    inv.count = Math.max(0, (inv.count || 0) + delta);
    document.getElementById('sheet-qty').textContent = inv.count;
    // Debounce the cloud save per id
    clearTimeout(invSaveTimers[inv.id]);
    invSaveTimers[inv.id] = setTimeout(() => {
      invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: inv.status || 'normal' });
    }, 350);
    renderInventory();
    renderBanner();
    if (activeTab === 'units') render();
    return;
  }
  const act = e.target.closest('[data-sheet]');
  if (!act) return;
  const a = act.dataset.sheet;
  if (a === 'close') closeSheet();
  if (a === 'edit') {
    const inv = inventory.find(x => x.id === sheetInvId);
    closeSheet();
    if (inv) openInvEdit(inv);
  }
  if (a === 'delete') {
    const inv = inventory.find(x => x.id === sheetInvId);
    if (!inv) return;
    if (!confirm(`Delete "${inv.name}"? This can't be undone.`)) return;
    invDelete(inv.id);
    closeSheet();
  }
});

function closeInvEdit() { invEditModal.classList.remove('open'); invEditingId = null; }

invEditModal.addEventListener('click', e => { if (e.target === invEditModal) closeInvEdit(); });
invEditModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('inv-cancel').addEventListener('click', closeInvEdit);
document.getElementById('addInvBtn').addEventListener('click', e => { e.preventDefault(); openInvEdit(null); });
document.getElementById('inv-save').addEventListener('click', async () => {
  const name = document.getElementById('inv-name').value.trim();
  if (!name) { document.getElementById('inv-name').focus(); return; }
  const count = Math.max(0, parseInt(document.getElementById('inv-count').value, 10) || 0);
  const supplier = document.getElementById('inv-supplier').value.trim() || null;
  const id = invEditingId || invId();
  await invUpsert({ id, name, count, supplier, status: 'normal' });
  renderInventory();
  renderBanner();
  if (activeTab === 'units') render();
  closeInvEdit();
});
document.getElementById('inv-delete').addEventListener('click', async () => {
  if (!invEditingId) return;
  const inv = inventory.find(x => x.id === invEditingId);
  if (!inv) return;
  if (!confirm(`Delete "${inv.name}"? This can't be undone.`)) return;
  await invDelete(invEditingId);
  closeInvEdit();
});

/* ---------- Inventory picker ---------- */
let pickerCb = null;
const pickerModal = document.getElementById('pickerModal');
function openPicker(cb, prefill = '') {
  pickerCb = cb;
  document.getElementById('picker-search').value = prefill;
  document.getElementById('picker-new-name').value = prefill;
  renderPickerList(prefill);
  pickerModal.classList.add('open');
}
function closePicker() { pickerModal.classList.remove('open'); pickerCb = null; }

function renderPickerList(q) {
  const needle = (q || '').trim().toLowerCase();
  const root = document.getElementById('picker-list');
  const list = inventory
    .filter(x => !needle || (x.name || '').toLowerCase().includes(needle))
    .sort((a, b) => a.count - b.count || a.name.localeCompare(b.name));
  if (list.length === 0) {
    root.innerHTML = `<div class="picker-empty">No matches in inventory.</div>`;
    return;
  }
  root.innerHTML = list.map(x => {
    const cls = invColor(x.count);
    return `<div class="picker-row" data-pick="${escapeHtml(x.id)}">
      <div class="inv-dot ${cls}"></div>
      <div class="inv-name">${escapeHtml(x.name)}</div>
      <div class="inv-count ${cls}">${x.count}</div>
    </div>`;
  }).join('');
}

pickerModal.addEventListener('click', e => { if (e.target === pickerModal) closePicker(); });
pickerModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('picker-search').addEventListener('input', e => {
  renderPickerList(e.target.value);
  document.getElementById('picker-new-name').value = e.target.value;
});
document.getElementById('picker-list').addEventListener('click', e => {
  const row = e.target.closest('[data-pick]');
  if (!row) return;
  const inv = inventory.find(x => x.id === row.dataset.pick);
  const cb = pickerCb; closePicker();
  if (cb) cb(inv || null);
});
document.getElementById('picker-new-add').addEventListener('click', async () => {
  const name = document.getElementById('picker-new-name').value.trim();
  if (!name) { document.getElementById('picker-new-name').focus(); return; }
  const id = invId();
  const item = { id, name, count: 0, supplier: null, status: 'normal' };
  await invUpsert(item);
  renderInventory();
  renderBanner();
  const cb = pickerCb; closePicker();
  if (cb) cb(item);
});
document.getElementById('picker-cancel').addEventListener('click', () => { const cb = pickerCb; closePicker(); /* cancelled */ });
document.getElementById('picker-skip').addEventListener('click', () => {
  // User just wants to flag without linking
  const cb = pickerCb; closePicker();
  if (cb) cb(null);
});

/* ---------- Ask-to-decrement on mark-done ---------- */
const decModal = document.getElementById('decModal');
let decYesCb = null;
function askDecrement(inv, onYes) {
  decYesCb = onYes;
  document.getElementById('dec-sub').textContent = `${inv.name} has ${inv.count}. Decrement to ${Math.max(0, inv.count - 1)}?`;
  decModal.classList.add('open');
}
decModal.addEventListener('click', e => { if (e.target === decModal) { decModal.classList.remove('open'); decYesCb = null; } });
decModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('dec-yes').addEventListener('click', () => {
  const cb = decYesCb; decYesCb = null; decModal.classList.remove('open');
  if (cb) cb();
});
document.getElementById('dec-no').addEventListener('click', () => {
  decYesCb = null; decModal.classList.remove('open');
});

/* ---------- Go ---------- */
render();
// Small delay so iOS Safari finishes painting before the first network call —
// prevents a spurious "Offline" flash.
setTimeout(() => { cloudLoad().then(startPolling); }, 150);
// Inventory loads in parallel, then polls every 4s.
setTimeout(() => {
  invLoad();
  setInterval(invPoll, 4000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') invPoll();
  });
}, 200);
</script>
