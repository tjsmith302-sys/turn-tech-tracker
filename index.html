/* ---------- Motion: staggered rise for list children ---------- */
// Applies .gt-rise to direct children of a container, then triggers .in with a stagger.
// Children are identified by selector — passed only the immediate items we want to animate.
function applyRise(container, itemSelector, { stagger = 45, max = 12 } = {}) {
  if (!container) return;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const items = Array.from(container.querySelectorAll(itemSelector));
  if (reduce) return; // no-op; CSS fallback keeps them visible
  items.forEach((el, i) => {
    el.classList.add('gt-rise');
    const delay = Math.min(i, max) * stagger;
    // Force reflow then add .in next frame so transition fires
    requestAnimationFrame(() => {
      setTimeout(() => el.classList.add('in'), delay);
    });
  });
}

/* ---------- Inventory render ---------- */
let invQuery = '';

function renderInventory() {
  const root = document.getElementById('invList');
  if (!root) return;
  const q = invQuery.trim().toLowerCase();
  const filtered = inventory.filter(x => !q || (x.name || '').toLowerCase().includes(q));

  if (filtered.length === 0) {
    root.innerHTML = `<div class="empty">${inventory.length === 0 ? 'No inventory yet. Tap + to add.' : 'Nothing matches. Clear search.'}</div>`;
    return;
  }

  // Separate on-order items into their own top section, then low/med/ok
  const onOrder = filtered.filter(x => parseOrder(x));
  const onOrderIds = new Set(onOrder.map(x => x.id));
  const groups = { low: [], med: [], ok: [] };
  filtered.filter(x => !onOrderIds.has(x.id)).forEach(x => groups[invColor(x.count)].push(x));
  Object.keys(groups).forEach(k => groups[k].sort((a, b) => a.count - b.count || a.name.localeCompare(b.name)));
  // Overdue first within on-order
  onOrder.sort((a, b) => {
    const oa = parseOrder(a), ob = parseOrder(b);
    if (oa.isOverdue !== ob.isOverdue) return oa.isOverdue ? -1 : 1;
    return oa.msRemaining - ob.msRemaining;
  });

  const rowHtml = (x, gClass) => {
    const order = parseOrder(x);
    const rowClass = order ? `inv-row onorder${order.isOverdue ? ' overdue' : ''}` : 'inv-row';
    const dotClass = order ? (order.isOverdue ? 'low' : 'ok') : gClass;
    const tag = order
      ? `<span class="inv-order-tag${order.isOverdue ? ' overdue' : ''}">${formatDue(order)}</span>`
      : '';
    return `
      <div class="${rowClass}" data-inv-id="${escapeHtml(x.id)}">
        <div class="inv-dot ${dotClass}"></div>
        <div class="inv-name">${tag ? `${tag}<br/>` : ''}${escapeHtml(x.name)}${x.part_number ? ` <span style="font-size:11px;color:var(--ink-faint);font-weight:500;letter-spacing:0.02em;">#${escapeHtml(x.part_number)}</span>` : ''}${x.supplier ? ` <span style="font-size:12px;color:var(--ink-faint);">· ${escapeHtml(x.supplier)}</span>` : ''}</div>
        <div class="inv-count ${gClass}">${x.count}</div>
      </div>`;
  };

  const groupLabel = { low: 'Low (0–1)', med: 'Medium (2–4)', ok: 'Stocked (5+)' };
  let html = '';
  if (onOrder.length) {
    const overdueCount = onOrder.filter(x => parseOrder(x).isOverdue).length;
    html += `
      <div class="inv-group ${overdueCount ? 'low' : 'ok'}">
        <div class="inv-group-head">
          <span>On order${overdueCount ? ` · ${overdueCount} overdue` : ''}</span>
          <span class="count">${onOrder.length}</span>
        </div>
        <div class="inv-list">
          ${onOrder.map(x => rowHtml(x, invColor(x.count))).join('')}
        </div>
      </div>`;
  }
  html += ['low', 'med', 'ok'].filter(g => groups[g].length).map(g => `
    <div class="inv-group ${g}">
      <div class="inv-group-head">
        <span>${groupLabel[g]}</span>
        <span class="count">${groups[g].length}</span>
      </div>
      <div class="inv-list">
        ${groups[g].map(x => rowHtml(x, g)).join('')}
      </div>
    </div>
  `).join('');
  root.innerHTML = html;

  applyRise(root, '.inv-row', { stagger: 35, max: 14 });
}

function renderBanner() {
  const banner = document.getElementById('invBanner');
  if (!banner) return;
  // Overdue on-order items take priority over raw low-stock
  const overdue = inventory.filter(x => { const o = parseOrder(x); return o && o.isOverdue; });
  if (overdue.length) {
    const names = overdue.slice(0, 3).map(x => x.name).join(', ');
    const more = overdue.length > 3 ? ` and ${overdue.length - 3} more` : '';
    banner.textContent = `${overdue.length} order${overdue.length === 1 ? '' : 's'} overdue: ${names}${more} — tap to check`;
    banner.classList.add('show');
    return;
  }
  const lows = inventory.filter(x => x.count <= 1 && !parseOrder(x));
  if (lows.length === 0) {
    banner.classList.remove('show');
    banner.textContent = '';
    return;
  }
  const names = lows.slice(0, 3).map(x => x.name).join(', ');
  const more = lows.length > 3 ? ` and ${lows.length - 3} more` : '';
  banner.textContent = `${lows.length} item${lows.length === 1 ? '' : 's'} low: ${names}${more}`;
  banner.classList.add('show');
}

/* ---------- Tabs wire-up ---------- */
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (btn) switchTab(btn.dataset.tab);
});
document.getElementById('invSearch').addEventListener('input', e => {
  invQuery = e.target.value;
  renderInventory();
});
// Tap banner → open the first overdue order (or first low-stock item) directly
document.getElementById('invBanner').addEventListener('click', () => {
  const overdue = inventory.find(x => { const o = parseOrder(x); return o && o.isOverdue; });
  if (overdue) { openArrivedModal(overdue); return; }
  const firstLow = inventory.find(x => (x.count || 0) <= 1 && !parseOrder(x));
  if (firstLow) openSheet(firstLow.id);
});
document.getElementById('invBanner').style.cursor = 'pointer';

/* ---------- Inventory row click → action sheet ---------- */
let sheetInvId = null;
document.getElementById('invList').addEventListener('click', e => {
  const row = e.target.closest('.inv-row');
  if (!row) return;
  openSheet(row.dataset.invId);
});

function openSheet(id) {
  const inv = inventory.find(x => x.id === id);
  if (!inv) return;
  sheetInvId = id;
  document.getElementById('sheet-name').textContent = inv.name;
  const order = parseOrder(inv);
  let sub = inv.supplier ? `Supplier: ${inv.supplier}` : 'Tap + / − to adjust';
  if (order) sub = `${formatDue(order)}${order.qtyOnWay ? ` · ${order.qtyOnWay} on the way` : ''}`;
  document.getElementById('sheet-sub').textContent = sub;
  document.getElementById('sheet-qty').textContent = inv.count;
  // Conditional buttons: order only for low+not-ordered, arrived+cancel only when ordered
  const isLow = invColor(inv.count) === 'low';
  document.getElementById('sheet-order-btn').style.display = (!order && isLow) ? '' : 'none';
  document.getElementById('sheet-arrived-btn').style.display = order ? '' : 'none';
  document.getElementById('sheet-cancel-order-btn').style.display = order ? '' : 'none';
  document.getElementById('invSheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('invSheet').classList.remove('open');
  sheetInvId = null;
}

const invSheet = document.getElementById('invSheet');
invSheet.addEventListener('click', e => { if (e.target === invSheet) closeSheet(); });
// Attach action delegation to the inner .modal (stopPropagation on .modal would otherwise block backdrop clicks)
invSheet.querySelector('.modal').addEventListener('click', e => e.stopPropagation());

invSheet.querySelector('.modal').addEventListener('click', e => {
  const qty = e.target.closest('[data-qty]');
  if (qty && sheetInvId) {
    const inv = inventory.find(x => x.id === sheetInvId);
    if (!inv) return;
    const delta = +qty.dataset.qty;
    inv.count = Math.max(0, (inv.count || 0) + delta);
    document.getElementById('sheet-qty').textContent = inv.count;
    // Debounce the cloud save per id
    clearTimeout(invSaveTimers[inv.id]);
    invSaveTimers[inv.id] = setTimeout(() => {
      invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: inv.status || 'normal' });
    }, 350);
    renderInventory();
    renderBanner();
    if (activeTab === 'units') render();
    return;
  }
  const act = e.target.closest('[data-sheet]');
  if (!act) return;
  const a = act.dataset.sheet;
  if (a === 'close') closeSheet();
  if (a === 'edit') {
    const inv = inventory.find(x => x.id === sheetInvId);
    closeSheet();
    if (inv) openInvEdit(inv);
  }
  if (a === 'delete') {
    const inv = inventory.find(x => x.id === sheetInvId);
    if (!inv) return;
    if (!confirm(`Delete "${inv.name}"? This can't be undone.`)) return;
    invDelete(inv.id);
    closeSheet();
  }
  if (a === 'order') {
    const inv = inventory.find(x => x.id === sheetInvId);
    closeSheet();
    if (inv) openOrderModal(inv);
  }
  if (a === 'arrived') {
    const inv = inventory.find(x => x.id === sheetInvId);
    closeSheet();
    if (inv) openArrivedModal(inv);
  }
  if (a === 'cancel-order') {
    const inv = inventory.find(x => x.id === sheetInvId);
    if (!inv) return;
    if (!confirm(`Cancel the order for "${inv.name}"?`)) return;
    clearOrderFor(inv);
    closeSheet();
  }
});

/* ---------- Order modal ---------- */
let orderCtxId = null;
let orderWindow = 48;
const orderModal = document.getElementById('orderModal');
function openOrderModal(inv) {
  orderCtxId = inv.id;
  orderWindow = 48;
  document.getElementById('order-title').textContent = `Mark on order: ${inv.name}`;
  document.getElementById('order-sub').textContent = 'We\u2019ll nudge you when the window\u2019s up.';
  document.getElementById('order-qty').value = '';
  orderModal.querySelectorAll('.order-window-btn').forEach(b => {
    b.classList.toggle('on', Number(b.dataset.window) === 48);
  });
  orderModal.classList.add('open');
}
function closeOrderModal() { orderModal.classList.remove('open'); orderCtxId = null; }
orderModal.addEventListener('click', e => { if (e.target === orderModal) closeOrderModal(); });
orderModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('order-cancel').addEventListener('click', closeOrderModal);
orderModal.querySelectorAll('.order-window-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    orderWindow = Number(btn.dataset.window);
    orderModal.querySelectorAll('.order-window-btn').forEach(b => {
      b.classList.toggle('on', Number(b.dataset.window) === orderWindow);
    });
  });
});
document.getElementById('order-save').addEventListener('click', () => {
  const inv = inventory.find(x => x.id === orderCtxId);
  if (!inv) { closeOrderModal(); return; }
  const qtyRaw = document.getElementById('order-qty').value;
  const qty = qtyRaw ? Math.max(0, parseInt(qtyRaw, 10) || 0) : 0;
  const due = new Date(Date.now() + orderWindow * 3600 * 1000).toISOString();
  saveOrderFor(inv, { qtyOnWay: qty, dueAt: due, markedAt: new Date().toISOString(), windowHours: orderWindow });
  closeOrderModal();
});

/* ---------- Arrived modal ---------- */
let arrivedCtxId = null;
const arrivedModal = document.getElementById('arrivedModal');
function openArrivedModal(inv) {
  arrivedCtxId = inv.id;
  const order = parseOrder(inv);
  document.getElementById('arrived-title').textContent = `Did it arrive: ${inv.name}?`;
  const sub = order
    ? `${order.isOverdue ? 'Overdue' : formatDue(order)}${order.qtyOnWay ? ` · ${order.qtyOnWay} expected` : ''}`
    : '';
  document.getElementById('arrived-sub').textContent = sub;
  document.getElementById('arrived-qty').value = order && order.qtyOnWay ? String(order.qtyOnWay) : '';
  arrivedModal.querySelectorAll('.order-window-btn').forEach(b => b.classList.remove('on'));
  arrivedModal.classList.add('open');
}
function closeArrivedModal() { arrivedModal.classList.remove('open'); arrivedCtxId = null; }
arrivedModal.addEventListener('click', e => { if (e.target === arrivedModal) closeArrivedModal(); });
arrivedModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('arrived-close').addEventListener('click', closeArrivedModal);
document.getElementById('arrived-yes').addEventListener('click', () => {
  const inv = inventory.find(x => x.id === arrivedCtxId);
  if (!inv) { closeArrivedModal(); return; }
  const qtyRaw = document.getElementById('arrived-qty').value;
  const qty = Math.max(1, parseInt(qtyRaw, 10) || 0);
  if (!qty) { alert('Enter how many arrived.'); return; }
  inv.count = (inv.count || 0) + qty;
  inv.status = 'normal';
  invUpsert({ id: inv.id, name: inv.name, count: inv.count, supplier: inv.supplier || null, status: 'normal' });
  closeArrivedModal();
  renderInventory();
  renderBanner();
  if (activeTab === 'units') render();
});
arrivedModal.querySelectorAll('.order-window-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const inv = inventory.find(x => x.id === arrivedCtxId);
    if (!inv) { closeArrivedModal(); return; }
    const hrs = Number(btn.dataset.resnooze) || 48;
    const prev = parseOrder(inv) || {};
    const due = new Date(Date.now() + hrs * 3600 * 1000).toISOString();
    saveOrderFor(inv, { qtyOnWay: prev.qtyOnWay || 0, dueAt: due, markedAt: prev.markedAt || new Date().toISOString(), windowHours: hrs });
    closeArrivedModal();
  });
});

/* ---------- Inventory edit modal ---------- */
let invEditingId = null;
const invEditModal = document.getElementById('invEditModal');
function openInvEdit(inv) {
  invEditingId = inv ? inv.id : null;
  document.getElementById('invEditTitle').textContent = inv ? `Edit ${inv.name}` : 'New Item';
  document.getElementById('inv-delete').style.display = inv ? '' : 'none';
  document.getElementById('inv-name').value = inv ? inv.name : '';
  document.getElementById('inv-part-number').value = inv ? (inv.part_number || '') : '';
  document.getElementById('inv-count').value = inv ? inv.count : 0;
  document.getElementById('inv-supplier').value = inv ? (inv.supplier || '') : '';
  resetScanBtn();
  invEditModal.classList.add('open');
}
function closeInvEdit() { invEditModal.classList.remove('open'); invEditingId = null; }

invEditModal.addEventListener('click', e => { if (e.target === invEditModal) closeInvEdit(); });
invEditModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('inv-cancel').addEventListener('click', closeInvEdit);
document.getElementById('addInvBtn').addEventListener('click', e => { e.preventDefault(); openInvEdit(null); });
document.getElementById('inv-save').addEventListener('click', async () => {
  const name = document.getElementById('inv-name').value.trim();
  if (!name) { document.getElementById('inv-name').focus(); return; }
  const count = Math.max(0, parseInt(document.getElementById('inv-count').value, 10) || 0);
  const supplier = document.getElementById('inv-supplier').value.trim() || null;
  const part_number = document.getElementById('inv-part-number').value.trim() || null;
  const id = invEditingId || invId();
  await invUpsert({ id, name, count, supplier, part_number, status: 'normal' });
  renderInventory();
  renderBanner();
  if (activeTab === 'units') render();
  closeInvEdit();
});
document.getElementById('inv-delete').addEventListener('click', async () => {
  if (!invEditingId) return;
  const inv = inventory.find(x => x.id === invEditingId);
  if (!inv) return;
  if (!confirm(`Delete "${inv.name}"? This can't be undone.`)) return;
  await invDelete(invEditingId);
  closeInvEdit();
});

/* ---------- Scan-part-label ---------- */
const scanBtn = document.getElementById('inv-scan-btn');
const scanInput = document.getElementById('inv-scan-input');
const scanLabel = document.getElementById('inv-scan-label');
function resetScanBtn() {
  scanBtn.classList.remove('scanning');
  scanBtn.disabled = false;
  scanLabel.textContent = 'Scan label';
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result));
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
scanBtn.addEventListener('click', () => { if (!scanBtn.disabled) scanInput.click(); });
scanInput.addEventListener('change', async () => {
  const file = scanInput.files && scanInput.files[0];
  scanInput.value = '';
  if (!file) return;
  scanBtn.classList.add('scanning');
  scanBtn.disabled = true;
  scanLabel.textContent = 'Reading label…';
  try {
    const dataUrl = await fileToBase64(file);
    const res = await fetch(`${SUPABASE_URL}/functions/v1/scan-part-label`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ imageBase64: dataUrl })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const nameEl = document.getElementById('inv-name');
    const pnEl = document.getElementById('inv-part-number');
    const supEl = document.getElementById('inv-supplier');
    if (data.name && !nameEl.value.trim()) nameEl.value = data.name;
    if (data.partNumber && !pnEl.value.trim()) pnEl.value = data.partNumber;
    if (data.supplier && !supEl.value.trim()) supEl.value = data.supplier;
    scanBtn.classList.remove('scanning');
    scanLabel.textContent = (data.name || data.partNumber || data.supplier) ? '✓ Scanned — review & save' : 'Couldn\'t read label';
    setTimeout(resetScanBtn, 2500);
  } catch (e) {
    console.warn('scan failed', e);
    scanBtn.classList.remove('scanning');
    scanLabel.textContent = 'Scan failed — enter manually';
    setTimeout(resetScanBtn, 2500);
  } finally {
    scanBtn.disabled = false;
  }
});

/* ---------- Inventory picker ---------- */
let pickerCb = null;
const pickerModal = document.getElementById('pickerModal');
function openPicker(cb, prefill = '') {
  pickerCb = cb;
  document.getElementById('picker-search').value = prefill;
  document.getElementById('picker-new-name').value = prefill;
  renderPickerList(prefill);
  pickerModal.classList.add('open');
}
function closePicker() { pickerModal.classList.remove('open'); pickerCb = null; }

function renderPickerList(q) {
  const needle = (q || '').trim().toLowerCase();
  const root = document.getElementById('picker-list');
  const list = inventory
    .filter(x => !needle || (x.name || '').toLowerCase().includes(needle))
    .sort((a, b) => a.count - b.count || a.name.localeCompare(b.name));
  if (list.length === 0) {
    root.innerHTML = `<div class="picker-empty">No matches in inventory.</div>`;
    return;
  }
  root.innerHTML = list.map(x => {
    const cls = invColor(x.count);
    return `<div class="picker-row" data-pick="${escapeHtml(x.id)}">
      <div class="inv-dot ${cls}"></div>
      <div class="inv-name">${escapeHtml(x.name)}</div>
      <div class="inv-count ${cls}">${x.count}</div>
    </div>`;
  }).join('');
}

pickerModal.addEventListener('click', e => { if (e.target === pickerModal) closePicker(); });
pickerModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('picker-search').addEventListener('input', e => {
  renderPickerList(e.target.value);
  document.getElementById('picker-new-name').value = e.target.value;
});
document.getElementById('picker-list').addEventListener('click', e => {
  const row = e.target.closest('[data-pick]');
  if (!row) return;
  const inv = inventory.find(x => x.id === row.dataset.pick);
  const cb = pickerCb; closePicker();
  if (cb) cb(inv || null);
});
document.getElementById('picker-new-add').addEventListener('click', async () => {
  const name = document.getElementById('picker-new-name').value.trim();
  if (!name) { document.getElementById('picker-new-name').focus(); return; }
  const id = invId();
  const item = { id, name, count: 0, supplier: null, status: 'normal' };
  await invUpsert(item);
  renderInventory();
  renderBanner();
  const cb = pickerCb; closePicker();
  if (cb) cb(item);
});
document.getElementById('picker-cancel').addEventListener('click', () => { const cb = pickerCb; closePicker(); /* cancelled */ });
document.getElementById('picker-skip').addEventListener('click', () => {
  // User just wants to flag without linking
  const cb = pickerCb; closePicker();
  if (cb) cb(null);
});

/* ---------- Ask-to-decrement on mark-done ---------- */
const decModal = document.getElementById('decModal');
let decYesCb = null;
function askDecrement(inv, onYes) {
  decYesCb = onYes;
  document.getElementById('dec-sub').textContent = `${inv.name} has ${inv.count}. Decrement to ${Math.max(0, inv.count - 1)}?`;
  decModal.classList.add('open');
}
decModal.addEventListener('click', e => { if (e.target === decModal) { decModal.classList.remove('open'); decYesCb = null; } });
decModal.querySelector('.modal').addEventListener('click', e => e.stopPropagation());
document.getElementById('dec-yes').addEventListener('click', () => {
  const cb = decYesCb; decYesCb = null; decModal.classList.remove('open');
  if (cb) cb();
});
document.getElementById('dec-no').addEventListener('click', () => {
  decYesCb = null; decModal.classList.remove('open');
});

/* ---------- Go ---------- */
render();
// Small delay so iOS Safari finishes painting before the first network call —
// prevents a spurious "Offline" flash.
setTimeout(() => { cloudLoad().then(startPolling); }, 150);
// Inventory loads in parallel, then polls every 4s.
setTimeout(() => {
  invLoad();
  setInterval(invPoll, 4000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') invPoll();
  });
}, 200);
</script>
