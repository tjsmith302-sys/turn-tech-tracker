<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#1a1814" />
<title>Goturn — moved</title>
<meta http-equiv="refresh" content="3;url=https://goturn.vercel.app/" />
<link rel="canonical" href="https://goturn.vercel.app/" />
<style>
:root{ --bg:#1a1814; --surface:#22201c; --ivory:#efe7d5; --ivory-dim:#c8c0b0; --accent:#8fb194; }
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--ivory); font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; min-height:100dvh; }
body{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 24px; gap:24px; text-align:center; }
.mark{ font-family:Georgia,serif; font-weight:500; font-size:36px; letter-spacing:-0.02em; }
.card{ width:100%; max-width:420px; background:var(--surface); border:1px solid rgba(239,231,213,0.06); border-radius:16px; padding:28px 24px; display:flex; flex-direction:column; gap:14px; }
h1{ font-family:Georgia,serif; font-weight:500; font-size:22px; margin:0; letter-spacing:-0.01em; }
p{ font-size:14px; color:var(--ivory-dim); line-height:1.55; margin:0; }
a.btn{ display:inline-block; appearance:none; border:1px solid var(--accent); background:transparent; color:var(--ivory); font-weight:500; font-size:15px; padding:12px 18px; border-radius:10px; cursor:pointer; text-decoration:none; min-height:44px; line-height:20px; }
a.btn:hover{ background:rgba(143,177,148,0.08); }
.url{ font-family:'JetBrains Mono','Menlo',monospace; font-size:13px; color:var(--accent); word-break:break-all; }
</style>
</head>
<body>
<div class="mark">Goturn</div>
<section class="card">
  <h1>We moved</h1>
  <p>Goturn now lives at:</p>
  <p class="url">goturn.vercel.app</p>
  <p>Sign in with the Google account your manager used to invite you.</p>
  <a class="btn" href="https://goturn.vercel.app/">Open Goturn</a>
  <p style="font-size:12px;opacity:0.7;">Redirecting automatically in 3 seconds…</p>
</section>
<script>setTimeout(function(){ window.location.replace('https://goturn.vercel.app/'); }, 3000);</script>
</body>
</html>
